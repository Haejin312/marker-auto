<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Marker Automation</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

:root {
  --bg:       #eeecea;
  --surface:  #ffffff;
  --surface2: #f5f3f0;
  --border:   #d8d4ce;
  --border2:  #c0bbb4;
  --text:     #1a1816;
  --text2:    #3d3830;
  --text3:    #7a746c;
  --accent:   #1d4ed8;
  --accent-h: #1740b8;
  --green:    #15803d;
  --green-bg: #dcfce7;
  --red:      #b91c1c;
  --red-bg:   #fee2e2;
  --orange:   #c2410c;
  --orange-bg:#ffedd5;
  --yellow:   #92400e;
  --yellow-bg:#fef3c7;
  --shadow:   0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
  --shadow-md:0 4px 8px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.05);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', 'Segoe UI', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── HEADER ─────────────────────────────────────────────────────────────── */
header {
  background: var(--surface);
  border-bottom: 2px solid var(--border);
  padding: 0 24px;
  height: 64px;
  display: flex;
  align-items: center;
  gap: 14px;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow-md);
}

.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon {
  width: 36px; height: 36px;
  background: var(--accent);
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.logo h1 { font-size: 18px; font-weight: 700; color: var(--text); white-space: nowrap; }
.logo h1 span { color: var(--accent); }

.mode-toggle {
  display: flex;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 9px;
  padding: 3px;
  gap: 2px;
}
.mode-btn {
  padding: 6px 16px;
  border-radius: 7px;
  border: none;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  background: none;
  color: var(--text3);
  transition: all .15s;
  font-family: inherit;
}
.mode-btn.active { background: var(--accent); color: #fff; }

/* 서버 상태 */
.srv {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--surface2);
  border: 1.5px solid var(--border2);
  border-radius: 24px;
  padding: 7px 16px;
  font-size: 14px;
  font-weight: 600;
  color: var(--text2);
  margin-left: auto;
  white-space: nowrap;
}
.dot { width: 9px; height: 9px; border-radius: 50%; background: var(--red); flex-shrink: 0; }
.dot.on { background: var(--green); animation: blink 2s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

/* 헤더 버튼 */
.hdr-btns { display: flex; gap: 8px; }

.hdr-btn {
  padding: 9px 17px;
  border: 1.5px solid var(--border2);
  border-radius: 9px;
  background: var(--surface);
  color: var(--text2);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: all .15s;
  display: flex; align-items: center; gap: 6px;
  white-space: nowrap;
}
.hdr-btn:hover { border-color: var(--accent); color: var(--accent); background: #eff6ff; }
.emergency-btn {
  padding: 8px 18px;
  background: #dc2626;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: background .15s;
}
.emergency-btn:hover { background: #991b1b; }


.show-btn {
  border-color: var(--orange);
  color: var(--orange);
  background: var(--orange-bg);
}
.show-btn:hover { background: #fed7aa; border-color: #9a3412; color: #9a3412; }

.start-btn {
  padding: 9px 22px;
  background: var(--accent);
  border: none;
  border-radius: 9px;
  color: #fff;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: background .15s;
  white-space: nowrap;
}
.start-btn:hover { background: var(--accent-h); }
.start-btn:disabled { opacity: .4; cursor: not-allowed; }

.cancel-btn {
  padding: 9px 18px;
  background: var(--red-bg);
  border: 1.5px solid var(--red);
  border-radius: 9px;
  color: var(--red);
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  display: none;
  transition: all .15s;
}
.cancel-btn:hover { background: #fca5a5; }

/* ── RECAP BAR ───────────────────────────────────────────────────────────── */
#recapBar {
  background: var(--yellow-bg);
  border-bottom: 1.5px solid #fde68a;
  padding: 9px 24px;
  display: none;
  align-items: center;
  gap: 14px;
  flex-shrink: 0;
}
.drop-area {
  border: 1.5px dashed var(--border2);
  border-radius: 8px;
  padding: 7px 20px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  color: var(--text3);
  background: var(--surface);
  transition: all .15s;
}
.drop-area:hover { border-color: var(--accent); color: var(--accent); }

/* ── MAIN — 전체 스크롤 ──────────────────────────────────────────────────── */
.main-wrap {
  flex: 1;
  overflow: auto;
  padding: 16px 24px 28px;
}

.top-row {
  display: flex;
  gap: 10px;
  margin-bottom: 12px;
  min-width: max-content;
}
.bottom-row {
  display: flex;
  gap: 10px;
  min-width: max-content;
  align-items: flex-start;
}

/* ── TOP CARD ─────────────────────────────────────────────────────────────── */
.top-card {
  width: 210px;
  flex-shrink: 0;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  box-shadow: var(--shadow);
  overflow: hidden;
}
.top-card.active  { border-color: var(--accent); }
.top-card.inactive { opacity: .42; }

.card-head {
  background: var(--surface2);
  padding: 9px 12px;
  display: flex; align-items: center; gap: 8px;
  border-bottom: 1.5px solid var(--border);
}
.card-num {
  width: 24px; height: 24px;
  border-radius: 6px;
  background: var(--accent); color: #fff;
  font-size: 12px; font-weight: 800;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.card-title { flex: 1; font-size: 12px; font-weight: 600; color: var(--text2); }
.ctog {
  width: 20px; height: 20px;
  border-radius: 5px;
  border: 1.5px solid var(--border2);
  background: none;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text3); font-size: 11px; font-weight: 700;
  transition: all .15s;
}
.ctog.on { background: var(--accent); border-color: var(--accent); color: #fff; }

.card-top-body {
  padding: 10px 12px;
  display: flex; flex-direction: column; gap: 6px;
}

.sec {
  font-size: 9px; font-weight: 700;
  letter-spacing: 1.2px; color: var(--text3);
  text-transform: uppercase;
}

.inp {
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  padding: 6px 9px;
  font-size: 13px; font-family: inherit;
  outline: none; width: 100%;
  transition: border-color .15s, background .15s;
}
.inp:focus { border-color: var(--accent); background: #fff; }
.inp.sm { font-size: 12px; padding: 5px 8px; }
select.inp { cursor: pointer; }

.sz-group {
  font-size: 9px; color: var(--text3);
  font-weight: 700; letter-spacing: .8px;
  text-transform: uppercase; margin: 4px 0 2px;
}
.sz-row { display: grid; grid-template-columns: 46px 1fr; gap: 4px; align-items: center; }
.sz-lbl { font-size: 12px; font-weight: 500; color: var(--text2); }
.sz-inp {
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 5px;
  color: var(--text);
  padding: 4px 7px;
  font-size: 12px; font-family: 'DM Mono', monospace;
  outline: none; width: 100%;
  transition: all .15s;
}
.sz-inp:focus { border-color: var(--accent); background: #fff; }
.sz-inp.v { background: #eff6ff; border-color: #93c5fd; color: var(--accent); font-weight: 600; }
.sz-inp::-webkit-inner-spin-button,
.sz-inp::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
.sz-inp { -moz-appearance: textfield; }

hr.d { border: none; border-top: 1.5px solid var(--border); margin: 3px 0; }

/* ── BOT CARD ─────────────────────────────────────────────────────────────── */
.bot-card {
  width: 210px; flex-shrink: 0;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  box-shadow: var(--shadow);
  padding: 12px 13px;
  display: flex; flex-direction: column; gap: 8px;
}
.bot-card.active  { border-color: var(--accent); }
.bot-card.inactive { opacity: .42; }

.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.cell { display: flex; flex-direction: column; gap: 3px; }
.cell-lbl { font-size: 10px; font-weight: 600; color: var(--text3); letter-spacing: .5px; }
.inherited { color: var(--text3) !important; background: var(--surface2) !important; }

/* 마커 타입 토글 버튼 */
.mtype-row { display: flex; gap: 5px; }
.mtype-opt {
  flex: 1; padding: 6px 4px;
  border: 1.5px solid var(--border);
  border-radius: 7px;
  background: var(--surface2);
  color: var(--text3);
  font-size: 11px; font-weight: 600;
  cursor: pointer; text-align: center;
  transition: all .15s; font-family: inherit;
  line-height: 1.3;
}
.mtype-opt.sel {
  border-color: var(--accent);
  background: #eff6ff;
  color: var(--accent);
}

/* ── PATTERN CARD ────────────────────────────────────────────────────────── */
.pttn-card {
  min-width: 300px; flex: 1;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  box-shadow: var(--shadow);
  padding: 14px 16px;
  display: flex; flex-direction: column; gap: 10px;
}
.pttn-hint { font-size: 12px; color: var(--text3); }
.pttn-list { display: flex; flex-direction: column; gap: 7px; }
.pttn-item {
  display: flex; align-items: center; gap: 9px;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 8px; padding: 8px 12px;
}
.pttn-style { font-size: 14px; font-weight: 700; color: var(--text); min-width: 50px; }
.pttn-file-btn {
  padding: 5px 12px;
  border: 1.5px dashed var(--border2);
  border-radius: 6px;
  background: none; color: var(--text3);
  font-size: 12px; font-weight: 500;
  cursor: pointer; transition: all .15s;
  white-space: nowrap; flex-shrink: 0; font-family: inherit;
}
.pttn-file-btn:hover { border-color: var(--accent); color: var(--accent); background: #eff6ff; }
.pttn-file-btn.loaded {
  border-style: solid; border-color: var(--green);
  color: var(--green); background: var(--green-bg);
}
.pttn-empty { font-size: 13px; color: var(--text3); font-style: italic; padding: 8px 0; }

/* ── STATUS BAR ──────────────────────────────────────────────────────────── */
#statusPanel {
  background: var(--surface);
  border-top: 2px solid var(--border);
  padding: 9px 24px;
  flex-shrink: 0;
  position: sticky;
  bottom: 0;
  box-shadow: 0 -2px 10px rgba(0,0,0,.07);
}
.prog-row { display: flex; align-items: center; gap: 16px; }
.prog-wrap { flex: 1; }
.prog-lbl {
  display: flex; justify-content: space-between;
  font-size: 13px; font-weight: 600; color: var(--text2);
  margin-bottom: 5px;
}
.prog-bar {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 100px; height: 6px;
}
.prog-fill {
  height: 100%; border-radius: 100px;
  background: linear-gradient(90deg, var(--accent), #7c3aed);
  transition: width .5s;
}

/* 결과 뱃지 */
#resultBadge {
  display: none;
  align-items: center;
  gap: 8px;
  background: var(--green-bg);
  border: 1.5px solid var(--green);
  border-radius: 10px;
  padding: 6px 14px;
  white-space: nowrap;
}
.result-item {
  display: flex; flex-direction: column; align-items: center;
  gap: 1px;
}
.result-lbl { font-size: 9px; font-weight: 700; color: var(--green); letter-spacing: .8px; text-transform: uppercase; }
.result-val { font-size: 15px; font-weight: 800; color: var(--green); font-family: 'DM Mono', monospace; }
.result-div { width: 1px; height: 30px; background: var(--green); opacity: .3; }

.log-tog {
  font-size: 13px; font-weight: 600;
  color: var(--text3); cursor: pointer;
  white-space: nowrap; padding: 5px 12px;
  border: 1.5px solid var(--border);
  border-radius: 7px; background: var(--surface2);
  transition: all .15s;
}
.log-tog:hover { color: var(--accent); border-color: var(--accent); }

#logPanel {
  background: #1a1816;
  border-top: 2px solid var(--border);
  padding: 10px 24px; height: 200px;
  overflow-y: auto;
  font-family: 'DM Mono', 'Consolas', monospace;
  font-size: 12px; color: #9ca3af;
  display: none; flex-shrink: 0;
}
.ll { padding: 1px 0; line-height: 1.6; }
.ll.ok   { color: #4ade80; }
.ll.err  { color: #f87171; }
.ll.info { color: #60a5fa; }
.ll.warn { color: #fbbf24; }

/* ── Phase 3 v5 ── */
.opt-btn{padding:9px 20px;background:#7c3aed;border:none;border-radius:9px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s;white-space:nowrap;}
.opt-btn:hover{background:#6d28d9;}.opt-btn:disabled{opacity:.4;cursor:not-allowed;}
#optParamsBar{background:#f5f3ff;border-bottom:1.5px solid #ddd6fe;padding:6px 24px;display:flex;align-items:center;gap:18px;flex-shrink:0;}
.opar-lbl{font-size:12px;font-weight:700;color:#5b21b6;white-space:nowrap;}
.opar-f{display:flex;flex-direction:column;gap:2px;}
.opar-f label{font-size:9px;font-weight:700;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;}
.opar-f input{padding:4px 8px;font-size:12px;font-family:'DM Mono',monospace;border:1.5px solid #c4b5fd;border-radius:5px;background:#fff;color:var(--text);outline:none;width:60px;}
#optResultsPanel{margin:14px 0 0;background:var(--surface);border:1.5px solid #c4b5fd;border-radius:12px;box-shadow:var(--shadow);overflow:hidden;min-width:max-content;}
.opt-rh{background:#f5f3ff;border-bottom:1.5px solid #ddd6fe;padding:10px 16px;display:flex;align-items:center;gap:14px;}
.opt-rh-title{font-size:14px;font-weight:700;color:#5b21b6;white-space:nowrap;}
.opt-rh-prog{display:flex;align-items:center;gap:8px;flex:1;}
.opt-rh-bar{flex:1;max-width:280px;background:#ddd6fe;border-radius:100px;height:6px;overflow:hidden;}
.opt-rh-fill{height:100%;border-radius:100px;background:linear-gradient(90deg,#7c3aed,#2563eb);transition:width .4s;}
.opt-rh-txt{font-size:11px;color:#5b21b6;white-space:nowrap;}
.opt-log-mini{background:#1a1816;padding:8px 14px;height:80px;overflow-y:auto;font-family:'DM Mono',monospace;font-size:11px;color:#9ca3af;white-space:pre-wrap;word-break:break-all;border-bottom:1.5px solid var(--border);}
.opt-po-list{padding:4px 0;}
.opt-po-row{padding:9px 16px;border-bottom:1px solid var(--border);transition:background .1s;}
.opt-po-row:last-child{border-bottom:none;}.opt-po-row.cur{background:#f5f3ff;}
.opt-po-main{display:flex;align-items:center;gap:10px;flex-wrap:wrap;cursor:pointer;}
.opt-po-icon{font-size:16px;flex-shrink:0;}
.opt-po-label{font-size:13px;font-weight:700;color:var(--text);white-space:nowrap;}
.opt-po-sizes{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;flex:1;min-width:80px;}
.opt-po-ph{font-size:11px;padding:2px 7px;border-radius:4px;font-weight:700;white-space:nowrap;}
.opt-po-ph.phase1{background:var(--yellow-bg);color:var(--yellow);}
.opt-po-ph.phase2{background:#dbeafe;color:#1d4ed8;}
.opt-po-ph.done{background:var(--green-bg);color:var(--green);}
.opt-po-ph.error{background:var(--red-bg);color:var(--red);}
.opt-po-ph.waiting{background:var(--surface2);color:var(--text3);}
.opt-po-result{font-size:12px;font-weight:700;margin-left:auto;white-space:nowrap;}
.opt-po-det{margin:6px 0 2px 28px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;overflow:hidden;display:none;}
.opt-po-det.open{display:block;}
.opt-po-det table{width:100%;border-collapse:collapse;font-size:11px;}
.opt-po-det th{background:var(--surface2);padding:4px 8px;text-align:left;border-bottom:1px solid var(--border);font-weight:600;color:var(--text3);}
.opt-po-det td{padding:5px 8px;border-bottom:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;}
.opt-po-det tr:last-child td{border-bottom:none;}

/* PO별 버튼 영역 */
.po-btn-row {
  display: flex; gap: 0;
  border-bottom: 1.5px solid var(--border);
}
.po-view-btn, .po-opt-btn {
  flex: 1; padding: 6px 4px;
  border: none; border-right: 1px solid var(--border);
  background: var(--surface2);
  font-size: 11px; font-weight: 600;
  cursor: pointer; font-family: inherit;
  transition: all .15s; text-align: center;
  color: var(--text3);
}
.po-view-btn:last-child, .po-opt-btn:last-child { border-right: none; }
.po-view-btn:hover { background: var(--orange-bg); color: var(--orange); }
.po-opt-btn:hover  { background: #f5f3ff; color: #5b21b6; }
.po-view-btn.viewing { background: var(--orange-bg); color: var(--orange); }
.po-opt-btn.running  { background: var(--red-bg); color: var(--red); border-color: var(--red); }
.opt-ew{background:var(--orange-bg);color:var(--orange);border:1px solid #fed7aa;border-radius:3px;padding:1px 5px;font-size:10px;font-weight:700;}

/* ── 결과 오버레이 ──────────────────────────────────────── */
#resultOverlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.45);
  z-index: 9000;
  align-items: flex-start;
  justify-content: center;
  padding: 24px;
  overflow-y: auto;
}
#resultOverlay.open { display: flex; }
#resultBox {
  background: var(--surface);
  border-radius: 14px;
  width: 100%;
  max-width: 1100px;
  box-shadow: 0 20px 60px rgba(0,0,0,.25);
  display: flex;
  flex-direction: column;
  min-height: 60vh;
}
.rov-head {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 18px 24px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: var(--surface);
  border-radius: 14px 14px 0 0;
}
.rov-title { font-size: 17px; font-weight: 700; flex: 1; }
.rov-phase { font-size: 12px; color: var(--text3); margin-left: 8px; }
.rov-progress { font-size: 12px; color: var(--accent); font-weight: 600; }
.rov-view-btn {
  padding: 6px 14px;
  border-radius: 8px;
  border: 1.5px solid var(--border2);
  background: var(--surface2);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: background .15s;
}
.rov-view-btn:hover { background: var(--border); }
.rov-view-btn.viewing {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.rov-close {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: none;
  background: var(--surface2);
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
.rov-close:hover { background: var(--red-bg); color: var(--red); }
.rov-body { padding: 20px 24px; flex: 1; }
.rov-table-wrap {
  overflow-x: auto;
  border: 1px solid var(--border);
  border-radius: 10px;
}
.rov-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.rov-table th {
  padding: 9px 12px;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  text-align: left;
  font-weight: 600;
  font-size: 12px;
  color: var(--text3);
  white-space: nowrap;
  position: sticky;
  top: 0;
}
.rov-table td {
  padding: 8px 12px;

<body>

<header>
  <div class="logo">
    <div class="logo-icon">🧵</div>
    <h1>Mini Marker <span>Automation</span></h1>
  </div>
  <div class="mode-toggle">
    <button class="mode-btn active" onclick="setMode('manual')">직접 입력</button>
    <button class="mode-btn" onclick="setMode('recap')">Order Recap</button>
  </div>
  <div class="srv">
    <div class="dot" id="dot"></div>
    <span id="srvTxt">서버 연결 중...</span>
  </div>
  <div class="hdr-btns">
    <button class="hdr-btn" onclick="openDemo10()">🖥 Demo10 열기</button>
    <button class="emergency-btn" onclick="emergencyStop()">🛑 긴급종료</button>
  </div>
</header>

<div id="optParamsBar">
  <span class="opar-lbl">🔬 최적화 파라미터</span>
  <div class="opar-f"><label>Phase1 (분)</label><input type="number" id="opt-p1min" value="1" min="0.5" step="0.5"></div>
  <div class="opar-f"><label>Phase2 (분)</label><input type="number" id="opt-p2min" value="5" min="1" step="1"></div>
</div>

<div id="recapBar">
  <span style="font-size:14px;font-weight:700;color:var(--yellow)">📋 Order Recap</span>
  <div class="drop-area" onclick="document.getElementById('recapFile').click()">📂 파일 클릭 또는 드래그</div>
  <input type="file" id="recapFile" accept=".xlsx,.xls" style="display:none" onchange="loadRecap(this)">
  <span id="recapName" style="font-size:12px;color:var(--text3)"></span>
</div>

<div class="main-wrap">
  <div class="top-row" id="topRow"></div>
  <div class="bottom-row" id="botRow"></div>
  <div id="optResultsPanel" style="display:none"></div>
</div>

<div id="statusPanel">
  <div class="prog-row">
    <div class="prog-wrap">
      <div class="prog-lbl">
        <span id="progLabel">대기 중</span>
        <span id="progPct">0%</span>
      </div>
      <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    </div>
    <div id="resultBadge">
      <div class="result-item">
        <span class="result-lbl">효율</span>
        <span class="result-val" id="resEff">—</span>
      </div>
      <div class="result-div"></div>
      <div class="result-item">
        <span class="result-lbl">길이</span>
        <span class="result-val" id="resLen">—</span>
      </div>
    </div>
    <span class="log-tog" onclick="toggleLog()">📋 로그</span>
  </div>
</div>
<div id="logPanel"></div>

<script>
const SERVER  = (location.hostname === '127.0.0.1' || location.hostname === 'localhost')
               ? ''                          // Flask /ui 로 접속 → same-origin
               : 'http://127.0.0.1:5055';   // GitHub Pages → cross-origin fallback
const REG     = ['XS','S','M','L','XL','2XL','3XL','4XL','5XL','6XL'];
const TALL    = ['LTLL','XLTLL','2XLTLL','3XLTLL','4XLTLL','5XLTLL'];
const ALL     = [...REG,...TALL];
const STYLES  = ['K87','K128','K231','K84','K126'];
const N_CARDS = 9;

let mode='manual', polling=null, lastLogLen=0, dxfPaths={}, dxfNames={};

function setMtype(i, val){
  const hidden = document.getElementById('mtype_val'+i);
  if(hidden) hidden.value = val;
  ['2way','1way'].forEach(v=>{
    const btn=document.getElementById('mtype_'+v+'_'+i);
    if(btn) btn.classList.toggle('sel', v===val);
  });
}

async function checkServer(){
  try{
    const r=await fetch(SERVER+'/status',{signal:AbortSignal.timeout(2000)});
    if(r.ok){
      document.getElementById('dot').className='dot on';
      document.getElementById('srvTxt').textContent='서버 연결됨';
      return true;
    }
  }catch(e){}
  document.getElementById('dot').className='dot';
  document.getElementById('srvTxt').textContent='run.bat 실행 필요';
  return false;
}
setInterval(checkServer,3000); checkServer();

document.addEventListener('keydown',function(e){
  const el=e.target;
  if(!el.classList.contains('sz-inp')) return;
  if(!['Enter','ArrowDown','ArrowUp'].includes(e.key)) return;
  e.preventDefault();
  const all=[...document.querySelectorAll('.sz-inp')];
  const idx=all.indexOf(el);
  const next=e.key==='ArrowUp'?idx-1:idx+1;
  if(next>=0&&next<all.length){all[next].focus();all[next].select();}
});

function makeTopCard(i){
  const d=document.createElement('div');
  d.className='top-card'+(i===0?' active':' inactive'); d.id='tc'+i;
  d.innerHTML=`
  <div class="card-head">
    <div class="card-num">${i+1}</div>
    <span class="card-title" id="ctitle${i}">PO ${i+1}</span>
    <button class="${i===0?'ctog on':'ctog'}" id="ctog${i}" onclick="toggleCard(${i})">${i===0?'✓':'−'}</button>
  </div>
  <div class="po-btn-row">
    <button class="po-view-btn" id="poview${i}" onclick="togglePoView('PO'+(${i}+1),${i})">🔍 진행상황 확인</button>
    <button class="po-opt-btn" id="poopt${i}" onclick="startPoOpt(${i})">🔬 탐색 시작</button>
    <button class="po-res-btn" id="pores${i}" onclick="openOverlay(${i})">📊 결과 보기</button>
  </div>
  <div class="card-top-body">
    <div class="sec">Style #</div>
    <select class="inp" id="stylesel${i}" onchange="onStyleSel(${i})">
      <option value="">-- 선택 --</option>
      ${STYLES.map(s=>`<option value="${s}">${s}</option>`).join('')}
      <option value="__direct__">직접 입력</option>
    </select>
    <input type="text" class="inp sm" id="style${i}" placeholder="Style# 입력" style="display:none;margin-top:4px" oninput="onStyleChange(${i})">
    <hr class="d">
    <div class="sec">Size / PCS</div>
    <div class="sz-group">Regular</div>
    ${REG.map(s=>`<div class="sz-row"><span class="sz-lbl">${s}</span><input type="number" class="sz-inp" id="q${i}_${s}" min="0" placeholder="0" oninput="onQty(this)"></div>`).join('')}
    <div class="sz-group" style="margin-top:6px">Tall</div>
    ${TALL.map(s=>`<div class="sz-row"><span class="sz-lbl">${s}</span><input type="number" class="sz-inp" id="q${i}_${s}" min="0" placeholder="0" oninput="onQty(this)"></div>`).join('')}
  </div>`;
  return d;
}

function makeBotCard(i){
  const d=document.createElement('div');
  d.className='bot-card'+(i===0?' active':' inactive'); d.id='bc'+i;
  const w  =i===0?'value="74"'   :'placeholder="74"';
  const ml =i===0?'value="11"'   :'placeholder="11"';
  const buf=i===0?'value="0.125"':'placeholder="0.125"';
  const m1 =i===0?'value="1"'    :'placeholder="1"';
  const m2 =i===0?'value="5"'    :'placeholder="5"';
  const hint=i>0?'<span style="font-size:9px;color:var(--text3);margin-left:5px">(PO1 기준 자동 입력)</span>':'';
  d.innerHTML=`
    <div class="sec" style="display:flex;align-items:center">원단 설정${hint}</div>
    <div class="row2">
      <div class="cell">
        <span class="cell-lbl">폭 (inches)</span>
        <input class="inp sm" type="number" id="width${i}" ${w} oninput="onFabricChange(this,${i})">
      </div>
      <div class="cell">
        <span class="cell-lbl">최대 기장 (yds)</span>
        <input class="inp sm" type="number" id="maxlen${i}" ${ml} step="0.5" oninput="onFabricChange(this,${i})">
      </div>
    </div>
    <div class="cell">
      <span class="cell-lbl">버퍼 (inches)</span>
      <input class="inp sm" type="text" id="buf${i}" ${buf} oninput="onFabricChange(this,${i})">
    </div>
    <hr class="d">
    <div class="sec">마커 타입</div>
    <div class="mtype-row">
      <button class="mtype-opt sel" id="mtype_2way_${i}"
        onclick="setMtype(${i},'2way');document.getElementById('mtype_val${i}').dataset.manual='1'">
        1pc-2way
      </button>
      <button class="mtype-opt" id="mtype_1way_${i}"
        onclick="setMtype(${i},'1way');document.getElementById('mtype_val${i}').dataset.manual='1'">
        1pc-1way<br><span style="font-size:9px;font-weight:400;color:inherit">Stripe</span>
      </button>
    </div>
    <input type="hidden" id="mtype_val${i}" value="2way">
    <hr class="d">
    <div class="sec">네스팅 시간</div>
    <div class="row2">
      <div class="cell">
        <span class="cell-lbl">1단계 (분)</span>
        <input class="inp sm" type="number" id="m1_${i}" ${m1} min="1" oninput="onFabricChange(this,${i})">
      </div>
      <div class="cell">
        <span class="cell-lbl">2단계 (분)</span>
        <input class="inp sm" type="number" id="m2_${i}" ${m2} min="1" oninput="onFabricChange(this,${i})">
      </div>
    </div>`;
  return d;
}

function makePttnCard(){
  const d=document.createElement('div'); d.className='pttn-card';
  d.innerHTML=`
    <div style="display:flex;align-items:center;gap:10px">
      <span class="sec">패턴 불러오기</span>
      <span class="pttn-hint">Style# 선택 시 자동 생성 &nbsp;·&nbsp; DXF 드래그&드롭 가능</span>
    </div>
    <div class="pttn-list" id="pttnList">
      <span class="pttn-empty">위 카드에 Style#을 선택하면 목록이 생성됩니다</span>
    </div>`;
  return d;
}

function init(){
  const top=document.getElementById('topRow');
  const bot=document.getElementById('botRow');
  for(let i=0;i<N_CARDS;i++){top.appendChild(makeTopCard(i));bot.appendChild(makeBotCard(i));}
  bot.appendChild(makePttnCard());
}
init();

const FABRIC_FIELDS=['width','maxlen','buf','m1_','m2_'];

function inheritFromPO1(idx){
  if(!document.getElementById('tc0').classList.contains('active')) return;
  FABRIC_FIELDS.forEach(f=>{
    const src=document.getElementById(f+'0');
    const tgt=document.getElementById(f+idx);
    if(!src||!tgt||tgt.dataset.manual) return;
    tgt.value=src.value; tgt.classList.add('inherited');
  });
  const sm=document.getElementById('mtype_val0');
  const tm=document.getElementById('mtype_val'+idx);
  if(sm&&tm&&!tm.dataset.manual) setMtype(idx, sm.value);
}

function onFabricChange(el,cardIdx){
  el.dataset.manual='1'; el.classList.remove('inherited');
  if(cardIdx===0){
    for(let i=1;i<N_CARDS;i++){
      if(!document.getElementById('tc'+i).classList.contains('active')) continue;
      if(!getStyle(i)) continue;
      FABRIC_FIELDS.forEach(f=>{
        const tgt=document.getElementById(f+i);
        if(tgt&&!tgt.dataset.manual){tgt.value=document.getElementById(f+'0').value;tgt.classList.add('inherited');}
      });
    }
  }
}

function onQty(el){ el.classList.toggle('v',!!(el.value&&+el.value>0)); }

function activateCard(i){
  const tc=document.getElementById('tc'+i),bc=document.getElementById('bc'+i),t=document.getElementById('ctog'+i);
  if(!tc.classList.contains('active')){
    tc.classList.replace('inactive','active'); bc.classList.replace('inactive','active');
    t.textContent='✓'; t.className='ctog on';
  }
}

function onStyleSel(i){
  const sel=document.getElementById('stylesel'+i),inp=document.getElementById('style'+i);
  if(sel.value==='__direct__'){inp.style.display='block';inp.value='';inp.focus();}
  else if(sel.value){
    inp.style.display='none'; inp.value=sel.value;
    document.getElementById('ctitle'+i).textContent=sel.value;
    if(i>0){activateCard(i);inheritFromPO1(i);}
    updatePttnList();
  }else{
    inp.style.display='none'; inp.value='';
    document.getElementById('ctitle'+i).textContent='PO '+(i+1);
    updatePttnList();
  }
}

function onStyleChange(i){
  const v=document.getElementById('style'+i).value.trim();
  document.getElementById('ctitle'+i).textContent=v||('PO '+(i+1));
  if(v&&i>0){activateCard(i);inheritFromPO1(i);}
  updatePttnList();
}

function getStyle(i){
  const sel=document.getElementById('stylesel'+i),inp=document.getElementById('style'+i);
  return (sel.value&&sel.value!=='__direct__'?sel.value:inp.value).trim();
}

function toggleCard(i){
  const tc=document.getElementById('tc'+i),bc=document.getElementById('bc'+i),t=document.getElementById('ctog'+i);
  const active=tc.classList.contains('active');
  [tc,bc].forEach(c=>{if(active)c.classList.replace('active','inactive');else c.classList.replace('inactive','active');});
  t.textContent=active?'−':'✓'; t.className=active?'ctog':'ctog on';
  updatePttnList();
}

function updatePttnList(){
  const styles=new Set();
  for(let i=0;i<N_CARDS;i++){
    if(!document.getElementById('tc'+i).classList.contains('active')) continue;
    const s=getStyle(i); if(s) styles.add(s);
  }
  const list=document.getElementById('pttnList');
  if(!styles.size){list.innerHTML='<span class="pttn-empty">위 카드에 Style#을 선택하면 목록이 생성됩니다</span>';return;}
  const newP={}; styles.forEach(s=>{newP[s]=dxfPaths[s]||'';}); dxfPaths=newP;
  list.innerHTML=[...styles].map(s=>`
    <div class="pttn-item" id="pi_${s}">
      <span class="pttn-style">${s}</span>
      <label class="pttn-file-btn${dxfPaths[s]?' loaded':''}" id="pb_${s}">
        ${dxfPaths[s]?'✓ '+dxfNames[s]:'📂 클릭 또는 드롭'}
        <input type="file" accept=".dxf" style="display:none" id="pf_${s}" onchange="onDxf('${s}',this)">
      </label>
      <button onclick="clearDxf('${s}')" title="삭제"
        style="flex-shrink:0;width:24px;height:24px;border-radius:50%;border:1.5px solid var(--border2);background:none;color:var(--text3);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .15s"
        onmouseover="this.style.background='var(--red-bg)';this.style.color='var(--red)';this.style.borderColor='var(--red)'"
        onmouseout="this.style.background='none';this.style.color='var(--text3)';this.style.borderColor='var(--border2)'">✕</button>
    </div>`).join('');
}

async function onDxf(style,inp){const f=inp.files[0];if(!f)return;await uploadDxf(style,f);}

async function uploadDxf(style,file){
  const pb=document.getElementById('pb_'+style);
  if(pb){pb.className='pttn-file-btn';pb.innerHTML='⏳ 업로드 중...<input type="file" accept=".dxf" style="display:none" id="pf_'+style+'" onchange="onDxf(\''+style+'\',this)">';}
  const fd=new FormData(); fd.append('file',file); fd.append('style',style);
  try{
    const r=await fetch(SERVER+'/upload_dxf',{method:'POST',body:fd});
    const data=await r.json();
    if(data.path){
      dxfPaths[style]=data.path; dxfNames[style]=file.name;
      if(pb){pb.className='pttn-file-btn loaded';pb.innerHTML='✓ '+file.name+'<input type="file" accept=".dxf" style="display:none" id="pf_'+style+'" onchange="onDxf(\''+style+'\',this)">';}
      addLog('✅ '+style+' → '+file.name,'ok');
    }else{
      if(pb){pb.className='pttn-file-btn';pb.innerHTML='❌ 실패<input type="file" accept=".dxf" style="display:none" id="pf_'+style+'" onchange="onDxf(\''+style+'\',this)">';}
      addLog('업로드 실패: '+(data.error||'서버 오류'),'err');
    }
  }catch(e){
    if(pb){pb.className='pttn-file-btn';pb.innerHTML='📂 클릭 또는 드롭<input type="file" accept=".dxf" style="display:none" id="pf_'+style+'" onchange="onDxf(\''+style+'\',this)">';}
    addLog('업로드 오류: '+e.message,'err');
  }
}

function clearDxf(style){
  dxfPaths[style]=''; dxfNames[style]='';
  const pb=document.getElementById('pb_'+style);
  if(pb){pb.className='pttn-file-btn';pb.innerHTML='📂 클릭 또는 드롭<input type="file" accept=".dxf" style="display:none" id="pf_'+style+'" onchange="onDxf(\''+style+'\',this)">';}
}

function setupDrop(){
  document.addEventListener('dragenter',e=>e.preventDefault());
  document.addEventListener('dragleave',e=>e.preventDefault());
  document.addEventListener('dragover', e=>e.preventDefault());
  document.addEventListener('drop',e=>{
    e.preventDefault();
    const files=[...(e.dataTransfer.files||[])].filter(f=>f.name.toLowerCase().endsWith('.dxf'));
    if(!files.length){addLog('DXF 파일만 드롭할 수 있습니다','warn');return;}
    const sl=Object.keys(dxfPaths);
    if(!sl.length){addLog('Style#을 먼저 선택하세요','warn');return;}
    files.forEach(f=>{
      const m=sl.find(s=>f.name.toUpperCase().includes(s.toUpperCase()));
      uploadDxf(m||sl.find(s=>!dxfPaths[s])||sl[0],f);
    });
  });
}
setupDrop();

function setMode(m){
  mode=m;
  document.querySelectorAll('.mode-btn').forEach((b,i)=>b.classList.toggle('active',(i===0&&m==='manual')||(i===1&&m==='recap')));
  document.getElementById('recapBar').style.display=m==='recap'?'flex':'none';
}

function loadRecap(inp){
  const file=inp.files[0]; if(!file) return;
  document.getElementById('recapName').textContent=file.name;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const data=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      let poRow=-1,poCols=[];
      for(let r=0;r<data.length;r++){
        const m=data[r].map((c,i)=>({c:String(c).trim(),i})).filter(x=>x.c.match(/^\d{9,10}$/));
        if(m.length){poRow=r;poCols=m.slice(0,N_CARDS);break;}
      }
      if(poRow<0){addLog('PO번호 못 찾음','err');return;}
      let szRow=-1;
      for(let r=poRow;r<Math.min(poRow+10,data.length);r++){
        if(data[r]&&data[r].some(c=>c==='XS'||c==='S'||c==='LTLL')){szRow=r;break;}
      }
      if(szRow<0){addLog('사이즈 행 못 찾음','err');return;}
      const styleRow=data[poRow-1]||[];
      poCols.forEach(({c:po,i:col},ci)=>{
        const style=String(styleRow[col]||'').trim();
        const sel=document.getElementById('stylesel'+ci);
        if(STYLES.includes(style)){sel.value=style;}
        else{sel.value='__direct__';document.getElementById('style'+ci).value=style;document.getElementById('style'+ci).style.display='block';}
        document.getElementById('ctitle'+ci).textContent=style||po;
        for(let r=szRow;r<Math.min(szRow+25,data.length);r++){
          const row=data[r];const sz=String(row[1]||row[0]||'').trim();if(!sz)break;
          if(ALL.includes(sz)){const el=document.getElementById('q'+ci+'_'+sz);if(el){el.value=parseInt(row[col])||0;onQty(el);}}
        }
        if(ci>0)inheritFromPO1(ci);
        ['tc','bc'].forEach(p=>{const c=document.getElementById(p+ci);if(c.classList.contains('inactive'))c.classList.replace('inactive','active');});
        document.getElementById('ctog'+ci).textContent='✓';document.getElementById('ctog'+ci).className='ctog on';
      });
      for(let i=poCols.length;i<N_CARDS;i++){
        ['tc','bc'].forEach(p=>{const c=document.getElementById(p+i);if(c.classList.contains('active'))c.classList.replace('active','inactive');});
        document.getElementById('ctog'+i).textContent='−';document.getElementById('ctog'+i).className='ctog';
      }
      updatePttnList();
      addLog('Order Recap 로드 완료 — '+poCols.length+'개 PO','ok');
    }catch(err){addLog('파싱 오류: '+err.message,'err');}
  };
  reader.readAsArrayBuffer(file);
}


async function emergencyStop(){
  if(!confirm('서버를 완전히 종료합니다.\n모든 탐색이 중단됩니다. 계속하시겠습니까?')) return;
  try {
    await fetch(SERVER+'/emergency_stop', {method:'POST'});
  } catch(e) {}
  addLog('🛑 서버 종료됨 — CMD에서 python marker_local.py 로 재시작하세요','err');
  document.getElementById('srvTxt').textContent = '❌ 서버 종료됨';

function addLog(msg,cls=''){
  const box=document.getElementById('logPanel');
  const d=document.createElement('div'); d.className='ll'+(cls?' '+cls:'');
  const t=new Date().toLocaleTimeString('ko',{hour:'2-digit',minute:'2-digit',second:'2-digit'});

/* ══ Phase 3 v5 — per-PO 독립 실행 ══ */
let optPoll = null;
const _poViewing = new Set();
const _poRunning = new Set();

/* ── 진행상황 확인 토글 ─────────────────────────────────── */
async function togglePoView(poId, cardIdx) {
  const btn = document.getElementById('poview' + cardIdx);
  if (!btn) return;
  if (_poViewing.has(poId)) {
    try { await fetch(SERVER+'/hide_demo10_po/'+poId, {method:'POST'}); } catch(e){}
    _poViewing.delete(poId);
    btn.classList.remove('viewing');
    btn.innerHTML = '🔍 진행상황 확인';
  } else {
    try {
      const r = await fetch(SERVER+'/show_demo10_po/'+poId, {method:'POST'});
      const d = await r.json();
      if (d.error) { addLog(poId+' Demo10 없음 (탐색 실행 전)', 'warn'); return; }
    } catch(e) { addLog('서버 연결 안 됨','err'); return; }
    _poViewing.add(poId);
    btn.classList.add('viewing');
    btn.innerHTML = '✕ 확인 종료';
  }
}

/* ── PO별 탐색 시작 ─────────────────────────────────────── */
function collectSingleJob(cardIdx) {
  const poId = 'PO' + (cardIdx + 1);
  const style = getStyle(cardIdx);
  if (!style) { alert((cardIdx+1)+'번 카드: Style# 선택하세요'); return null; }
  const dxf = dxfPaths[style] || '';
  if (!dxf) { alert(style+' DXF 파일을 업로드하세요'); return null; }
  const sq = {};
  ALL.forEach(s => { const v=+document.getElementById('q'+cardIdx+'_'+s).value||0; if(v>0) sq[s]=v; });
  if (!Object.keys(sq).length) { alert('수량을 입력하세요'); return null; }
  const maxYds = +document.getElementById('maxlen'+cardIdx).value || 11;
  return {
    po_id: poId, style, dxf_path: dxf, sizes_qty: sq,
    width:       +document.getElementById('width'+cardIdx).value,
    length:      Math.round(maxYds * 36),
    buffer:      document.getElementById('buf'+cardIdx).value,
    marker_type: document.getElementById('mtype_val'+cardIdx).value,
    phase1_min:  +document.getElementById('opt-p1min').value || 1,
    phase2_min:  +document.getElementById('opt-p2min').value || 5,
  };
}

async function startPoOpt(cardIdx) {
  const ok = await checkServer();
  if (!ok) { alert('run.bat을 먼저 실행하세요!'); return; }
  const job = collectSingleJob(cardIdx);
  if (!job) return;
  const poId = job.po_id;
  if (_poRunning.has(poId)) { alert(poId+' 이미 실행 중'); return; }

  setPoOptBtn(cardIdx, 'running');
  _poRunning.add(poId);
  addLog(poId+' ('+job.style+') 탐색 시작', 'info');
  ensurePanel(job);

  try {
    const r = await fetch(SERVER+'/start_po_optimization', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({job})
    });
    const d = await r.json();
    if (d.error) { alert(d.error); setPoOptBtn(cardIdx,'idle'); _poRunning.delete(poId); return; }
    if (!optPoll) optPoll = setInterval(pollOpt, 2000);
    startP1Poll(poId);
  } catch(e) {
    alert('서버 오류: '+e);
    setPoOptBtn(cardIdx,'idle'); _poRunning.delete(poId);
  }
}

async function stopPoOpt(poId, cardIdx) {
  try { await fetch(SERVER+'/stop_po_optimization/'+poId, {method:'POST'}); } catch(e){}
  addLog(poId+' 중단 요청', 'warn');
  // 버튼은 pollOpt가 done/error 감지 후 리셋
}

function setPoOptBtn(cardIdx, state) {
  const btn = document.getElementById('poopt' + cardIdx);
  if (!btn) return;
  const poId = 'PO' + (cardIdx + 1);
  if (state === 'running') {
    btn.classList.add('running');
    btn.innerHTML = '■ 중단';
    btn.onclick = () => stopPoOpt(poId, cardIdx);
  } else {
    btn.classList.remove('running');
    btn.innerHTML = '🔬 탐색 시작';
    btn.onclick = () => startPoOpt(cardIdx);
  }
}

/* ── 폴링 ────────────────────────────────────────────────── */
async function pollOpt() {
  try {
    const r = await fetch(SERVER+'/optimization_status');
    const d = await r.json();
    updateOverall(d);
    Object.entries(d.po_summary||{}).forEach(([pid,ps]) => {
      updateCard(pid, ps);
      // 완료/오류 시 버튼 리셋
      if (ps.phase==='done'||ps.phase==='error') {
        _poRunning.delete(pid);
        const idx = parseInt(pid.replace('PO','')) - 1;
        setPoOptBtn(idx, 'idle');
      }
    });
    if (!d.running) {
      clearInterval(optPoll); optPoll = null;
      addLog('최적화 완료!', 'ok');
    }
  } catch(e) {}
}

function updateOverall(d) {
  const fill  = document.getElementById('opt-fill');
  const txt   = document.getElementById('opt-otxt');
  const logEl = document.getElementById('opt-log');
  if (!fill) return;
  const n=d.total_po||0, done=d.done_po||0;
  fill.style.width = (n>0?Math.round(done/n*100):0)+'%';
  txt.textContent  = `${done}/${n} PO 완료`;
  if (d.log?.length&&logEl) { logEl.textContent=d.log.join('\n'); logEl.scrollTop=logEl.scrollHeight; }
  document.querySelectorAll('.opt-po-row').forEach(el=>el.classList.remove('cur'));
  Object.entries(d.po_summary||{}).forEach(([pid,ps])=>{
    if (ps.phase==='phase1'||ps.phase==='phase2')
      document.getElementById('opr-'+pid)?.classList.add('cur');
  });
}

function updateCard(poId, ps) {
  const icon = document.getElementById('opi-'+poId);
  const ph   = document.getElementById('oph-'+poId);
  const res  = document.getElementById('opr2-'+poId);
  if (!icon) return;
  const icons  = {waiting:'⏳',phase1:'⚙️',phase2:'⚙️',done:'✅',error:'❌'};
  const labels = {waiting:'대기',phase1:'Phase1',phase2:'Phase2',done:'완료',error:'오류'};
  icon.textContent = icons[ps.phase]||'⏳';
  ph.textContent   = labels[ps.phase]||ps.phase;
  ph.className     = 'opt-po-ph '+(ps.phase||'waiting');
  if (ps.phase==='phase1'&&ps.total_p1>0) ph.textContent=`Phase1 ${ps.done_p1}/${ps.total_p1}`;
  else if (ps.phase==='phase2'&&ps.total_p2>0) ph.textContent=`Phase2 ${ps.done_p2}/${ps.total_p2}`;
  if (ps.best_yd!=null&&res)
    res.innerHTML=`<strong style="color:var(--green)">${ps.best_yd} yd</strong>
      <span style="color:var(--text3);font-size:11px;margin-left:4px">${ps.n_markers}개 마커</span>`;
  if (ps.error&&res) res.innerHTML=`<span style="color:var(--red);font-size:11px">오류</span>`;
  if (ps.phase==='done') {
    const det = document.getElementById('opd-'+poId);
    if (det&&!det.dataset.loaded) {
      det.dataset.loaded='1';
      fetch(SERVER+'/optimization_result/'+poId).then(r=>r.json()).then(d=>renderDet(poId,d)).catch(()=>{});
    }
  }
}

function toggleDet(poId) { document.getElementById('opd-'+poId)?.classList.toggle('open'); }

/* ── Phase1 실시간 결과 ──────────────────────────────────── */
const _p1PollMap = {}; // po_id → intervalId

function startP1Poll(poId) {
  if (_p1PollMap[poId]) return;
  _p1PollMap[poId] = setInterval(()=>fetchP1(poId), 3000);
}

async function fetchP1(poId) {
  try {
    const r = await fetch(SERVER+'/p1_progress/'+poId);
    const d = await r.json();
    renderP1Table(poId, d);
    if (d.phase !== 'phase1') {
      clearInterval(_p1PollMap[poId]);
      delete _p1PollMap[poId];
    }
  } catch(e) {}
}

function renderP1Table(poId, d) {
  let el = document.getElementById('p1tbl-'+poId);
  if (!el) {
    const det = document.getElementById('opd-'+poId);
    if (!det) return;
    el = document.createElement('div');
    el.id = 'p1tbl-'+poId;
    el.style.cssText = 'overflow:auto;max-height:320px;';
    det.prepend(el);
    det.classList.add('open');
  }
  const rows = d.p1_results || [];
  const done = d.done_p1 || 0, total = d.total_p1 || 0;
  const pct  = total > 0 ? Math.round(done/total*100) : 0;

  // 효율 기준 정렬 복사본 (원본 순서 유지 + 상위 표시)
  const sorted = [...rows].filter(r=>r.efficiency!=null)
                           .sort((a,b)=>b.efficiency-a.efficiency);

  const bestEff = sorted[0]?.efficiency;

  el.innerHTML = `
  <div style="padding:6px 12px;font-size:12px;color:var(--text3);border-bottom:1px solid var(--border)">
    Phase1 진행 ${done}/${total} (${pct}%) — 완료된 후보 결과 (효율 높은 순)
  </div>
  <table style="width:100%;font-size:12px;border-collapse:collapse">
    <thead style="position:sticky;top:0;background:var(--card)">
      <tr>
        <th style="padding:4px 8px;text-align:left;border-bottom:1px solid var(--border)">#</th>
        <th style="padding:4px 8px;text-align:left;border-bottom:1px solid var(--border)">마커 조합 (Ratio)</th>
        <th style="padding:4px 8px;text-align:right;border-bottom:1px solid var(--border)">효율%</th>
        <th style="padding:4px 8px;text-align:right;border-bottom:1px solid var(--border)">길이</th>
        <th style="padding:4px 8px;text-align:right;border-bottom:1px solid var(--border)">Scale</th>
      </tr>
    </thead>
    <tbody>
      ${sorted.map((r,i)=>{
        const isTop = i===0;
        const len = r.length_yd!=null ? `${r.length_yd}yd ${(r.length_in||0).toFixed(1)}"` : '—';
        const spec = Object.entries(r.spec||{}).map(([s,n])=>s+'×'+n).join(' ');
        return `<tr style="${isTop?'background:rgba(124,58,237,0.08)':''}">
          <td style="padding:3px 8px;color:var(--text3)">${r.idx}</td>
          <td style="padding:3px 8px;font-family:monospace">${spec}</td>
          <td style="padding:3px 8px;text-align:right;${isTop?'color:#7c3aed;font-weight:700':''}">
            ${r.efficiency!=null?r.efficiency+'%':'—'}
          </td>
          <td style="padding:3px 8px;text-align:right">${len}</td>
          <td style="padding:3px 8px;text-align:right;color:var(--text3)">×${r.opt_scale}</td>
        </tr>`;
      }).join('')}
      ${rows.filter(r=>r.efficiency==null).length > 0 ?
        `<tr><td colspan="5" style="padding:3px 8px;color:var(--text3);text-align:center">
          결과 없음: ${rows.filter(r=>r.efficiency==null).map(r=>r.key).join(', ')}
        </td></tr>` : ''}
    </tbody>
  </table>`;
}

function renderDet(poId, d) {
  const el = document.getElementById('opd-'+poId);
  if (!el) return;
  const fr = d.result;
  if (!fr||!fr.markers?.length) { el.innerHTML='<p style="padding:8px 12px;color:var(--text3)">결과 없음</p>'; return; }
  const rows = fr.markers.map(m => {
    const sc  = m.scale||1;
    const rs  = Object.entries(m.spec||{}).map(([s,n])=>s+'×'+Math.round(n/sc)).join(' ');
    const len = m.length_yd!=null?`${m.length_yd}yd ${(m.length_in||0).toFixed(1)}"`:'—';
    const cap = m.capture?'📸':'';
    return `<tr>
      <td>[${rs}]${sc>1?'×'+sc:''} ${cap}</td>
      <td>${m.cuts}컷</td><td>${m.efficiency||'—'}%</td><td>${len}</td>
      <td>${m.subtotal_yd}yd</td><td><span class="opt-ew">${m.endwaste_yd}yd</span></td>
    </tr>`;
  }).join('');
  el.innerHTML=`<table>
    <thead><tr><th>마커 조합</th><th>컷 수</th><th>효율</th><th>마커 길이</th><th>원단</th><th>웨이스트</th></tr></thead>
    <tbody>${rows}</tbody></table>
  <div style="padding:8px 12px;font-size:12px;border-top:1px solid var(--border);display:flex;gap:20px">
    <span>원단: <strong>${fr.total_fabric_yd} yd</strong></span>
    <span>웨이스트: <span class="opt-ew">${fr.total_endwaste_yd} yd</span></span>
    <span>총계: <strong style="color:#7c3aed">${fr.total_yd} yd</strong></span>
    <span style="color:var(--text3)">오버생산: ${Object.entries(fr.overproduction||{}).map(([s,n])=>s+'+'+n).join(' ')||'없음'}</span>
  </div>`;
}

function ensurePanel(job) {

  if (!_rovPoId) return;

    const [p1r, optr] = await Promise.all([
      fetch(SERVER + '/p1_progress/' + _rovPoId).then(r=>r.json()).catch(()=>null),

    ]);

function _renderRov(p1, opt) {
  const el = document.getElementById('rovContent');
  const prog = document.getElementById('rovProgress');
  const phEl = document.getElementById('rovPhase');

  if (!p1) { el.innerHTML='<div class="rov-empty">서버에서 데이터를 받지 못했습니다</div>'; return; }

  // 진행 상태
  const done = p1.done_p1 || 0, total = p1.total_p1 || 0;
  const pct  = total > 0 ? Math.round(done/total*100) : 0;
  prog.textContent = total > 0 ? `Phase1  ${done} / ${total}  (${pct}%)` : '';

  const phase = p1.phase || '';
  if      (phase === 'phase1') phEl.style.color = 'var(--accent)';
  else if (phase === 'phase2') phEl.style.color = '#7c3aed';
  else if (phase === 'done')   phEl.style.color = 'var(--green)';

  const results = (p1.p1_results || []).filter(r => r.efficiency != null);
  const failed  = (p1.p1_results || []).filter(r => r.efficiency == null);
  const sorted  = [...results].sort((a,b) => b.efficiency - a.efficiency);
  const maxEff  = sorted[0]?.efficiency || 1;

  let html = '';

  // Phase1 결과 테이블
  if (sorted.length === 0 && done === 0) {
    html += '<div class="rov-empty">⏳ 탐색 진행 중...</div>';
  } else {
    html += `<div class="rov-table-wrap"><table class="rov-table">
      <thead><tr>
        <th>#</th>
        <th>마커 조합 (Ratio)</th>
        <th style="text-align:right">효율%</th>
        <th style="text-align:right">길이</th>
        <th style="text-align:right">Scale</th>
      </tr></thead><tbody>`;

    sorted.forEach((r, i) => {
      const isTop = i === 0;
      const barW  = Math.round((r.efficiency / maxEff) * 80);
      const len   = r.length_yd != null ? `${r.length_yd}yd ${(r.length_in||0).toFixed(1)}"` : '—';
      const spec  = Object.entries(r.spec||{}).map(([s,n])=>s+'×'+n).join(' ');
      html += `<tr class="${isTop?'top-row':''}">
        <td style="color:var(--text3);font-size:11px">${r.idx}</td>
        <td style="font-family:monospace;font-size:12px">${spec}</td>
        <td style="text-align:right">
          <span class="rov-eff-bar" style="width:${barW}px"></span>
          <strong style="${isTop?'color:#7c3aed':''}">${r.efficiency}%</strong>
        </td>
        <td style="text-align:right">${len}</td>
        <td style="text-align:right;color:var(--text3)">×${r.opt_scale}</td>
      </tr>`;
    });

    if (failed.length > 0) {
      html += `<tr class="fail-row"><td colspan="5" style="font-size:11px;padding:6px 12px">
        결과 없음 (${failed.length}개): ${failed.slice(0,8).map(r=>r.key).join(', ')}${failed.length>8?'...':''}
      </td></tr>`;
    }

    html += '</tbody></table></div>';
    html += `<div style="margin-top:10px;font-size:12px;color:var(--text3)">
      완료: ${done}/${total} · 성공: ${results.length}개 · 실패: ${failed.length}개
    </div>`;
  }

  // LP 최적 결과 (완료 시)
  if (opt && opt.result && opt.result.markers?.length) {
    const fr = opt.result;
    const mRows = fr.markers.map(m => {
      const sc = m.scale||1;
      const rs = Object.entries(m.spec||{}).map(([s,n])=>s+'×'+Math.round(n/sc)).join(' ');
      const len2 = m.length_yd!=null?`${m.length_yd}yd ${(m.length_in||0).toFixed(1)}"` : '—';
      return `<tr>
        <td style="font-family:monospace;font-size:12px">[${rs}]${sc>1?' ×'+sc:''}</td>
        <td style="text-align:right">${m.cuts}컷</td>
        <td style="text-align:right"><strong>${m.efficiency||'—'}%</strong></td>
        <td style="text-align:right">${len2}</td>
        <td style="text-align:right">${m.subtotal_yd}yd</td>
      </tr>`;
    }).join('');
    html += `<div class="rov-lp">
      <div class="rov-lp-title">✅ 최적 마커 조합 — 총 ${fr.total_yd} yd</div>
      <table style="width:100%;border-collapse:collapse;font-size:13px">
        <thead><tr>
          <th style="text-align:left;padding:4px 8px;color:var(--text3);font-size:11px">마커</th>
          <th style="text-align:right;padding:4px 8px;color:var(--text3);font-size:11px">컷 수</th>
          <th style="text-align:right;padding:4px 8px;color:var(--text3);font-size:11px">효율</th>
          <th style="text-align:right;padding:4px 8px;color:var(--text3);font-size:11px">마커 길이</th>
          <th style="text-align:right;padding:4px 8px;color:var(--text3);font-size:11px">원단</th>
        </tr></thead>
        <tbody>${mRows}</tbody>
      </table>
      <div style="margin-top:10px;font-size:12px;display:flex;gap:20px">
        <span>원단: <strong>${fr.total_fabric_yd} yd</strong></span>
        <span>웨이스트: <strong style="color:var(--orange)">${fr.total_endwaste_yd} yd</strong></span>
        <span>합계: <strong style="color:#7c3aed;font-size:15px">${fr.total_yd} yd</strong></span>
      </div>
    </div>`;
  }

  el.innerHTML = html;
}

// ESC 키로 오버레이 닫기
document.addEventListener('keydown', e => { if(e.key==='Escape') closeOverlay(); });

</script>

<!-- 결과 오버레이 -->
<div id="resultOverlay">
  <div id="resultBox">
    <div class="rov-head">
      <div class="rov-title" id="rovTitle">PO 결과</div>
      <span class="rov-phase" id="rovPhase"></span>
      <span class="rov-progress" id="rovProgress"></span>
      <div style="flex:1"></div>
      <button class="rov-view-btn" id="rovViewBtn" onclick="toggleRovView()">🔍 진행상황 확인</button>
      <button class="rov-close" onclick="closeOverlay()" title="닫기">✕</button>
    </div>
    <div class="rov-body">
      <div id="rovContent"><div class="rov-empty">탐색 시작 후 결과가 여기에 표시됩니다</div></div>
    </div>
  </div>
</div>

</body>
</html>
