<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Marker Automation</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

:root {
  --bg:       #eeecea;
  --surface:  #ffffff;
  --surface2: #f5f3f0;
  --border:   #d8d4ce;
  --border2:  #c0bbb4;
  --text:     #1a1816;
  --text2:    #3d3830;
  --text3:    #7a746c;
  --accent:   #1d4ed8;
  --accent-h: #1740b8;
  --green:    #15803d;
  --green-bg: #dcfce7;
  --red:      #b91c1c;
  --red-bg:   #fee2e2;
  --orange:   #c2410c;
  --orange-bg:#ffedd5;
  --yellow:   #92400e;
  --yellow-bg:#fef3c7;
  --shadow:   0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
  --shadow-md:0 4px 8px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.05);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', 'Segoe UI', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── HEADER ─────────────────────────────────────────────────────────────── */
header {
  background: var(--surface);
  border-bottom: 2px solid var(--border);
  padding: 0 24px;
  height: 64px;
  display: flex;
  align-items: center;
  gap: 14px;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow-md);
}

.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon {
  width: 36px; height: 36px;
  background: var(--accent);
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.logo h1 { font-size: 18px; font-weight: 700; color: var(--text); white-space: nowrap; }
.logo h1 span { color: var(--accent); }

.mode-toggle {
  display: flex;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 9px;
  padding: 3px;
  gap: 2px;
}
.mode-btn {
  padding: 6px 16px;
  border-radius: 7px;
  border: none;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  background: none;
  color: var(--text3);
  transition: all .15s;
  font-family: inherit;
}
.mode-btn.active { background: var(--accent); color: #fff; }

/* 서버 상태 */
.srv {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--surface2);
  border: 1.5px solid var(--border2);
  border-radius: 24px;
  padding: 7px 16px;
  font-size: 14px;
  font-weight: 600;
  color: var(--text2);
  margin-left: auto;
  white-space: nowrap;
}
.dot { width: 9px; height: 9px; border-radius: 50%; background: var(--red); flex-shrink: 0; }
.dot.on { background: var(--green); animation: blink 2s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

/* 헤더 버튼 */
.hdr-btns { display: flex; gap: 8px; }

.hdr-btn {
  padding: 9px 17px;
  border: 1.5px solid var(--border2);
  border-radius: 9px;
  background: var(--surface);
  color: var(--text2);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: all .15s;
  display: flex; align-items: center; gap: 6px;
  white-space: nowrap;
}
.hdr-btn:hover { border-color: var(--accent); color: var(--accent); background: #eff6ff; }

.show-btn {
  border-color: var(--orange);
  color: var(--orange);
  background: var(--orange-bg);
}
.show-btn:hover { background: #fed7aa; border-color: #9a3412; color: #9a3412; }

.start-btn {
  padding: 9px 22px;
  background: var(--accent);
  border: none;
  border-radius: 9px;
  color: #fff;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: background .15s;
  white-space: nowrap;
}
.start-btn:hover { background: var(--accent-h); }
.start-btn:disabled { opacity: .4; cursor: not-allowed; }

.cancel-btn {
  padding: 9px 18px;
  background: var(--red-bg);
  border: 1.5px solid var(--red);
  border-radius: 9px;
  color: var(--red);
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  display: none;
  transition: all .15s;
}
.cancel-btn:hover { background: #fca5a5; }

/* ── RECAP BAR ───────────────────────────────────────────────────────────── */
#recapBar {
  background: var(--yellow-bg);
  border-bottom: 1.5px solid #fde68a;
  padding: 9px 24px;
  display: none;
  align-items: center;
  gap: 14px;
  flex-shrink: 0;
}
.drop-area {
  border: 1.5px dashed var(--border2);
  border-radius: 8px;
  padding: 7px 20px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  color: var(--text3);
  background: var(--surface);
  transition: all .15s;
}
.drop-area:hover { border-color: var(--accent); color: var(--accent); }

/* ── MAIN — 전체 스크롤 ──────────────────────────────────────────────────── */
.main-wrap {
  flex: 1;
  overflow: auto;
  padding: 16px 24px 28px;
}

.top-row {
  display: flex;
  gap: 10px;
  margin-bottom: 12px;
  min-width: max-content;
}
.bottom-row {
  display: flex;
  gap: 10px;
  min-width: max-content;
  align-items: flex-start;
}

/* ── TOP CARD ─────────────────────────────────────────────────────────────── */
.top-card {
  width: 210px;
  flex-shrink: 0;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  box-shadow: var(--shadow);
  overflow: hidden;
}
.top-card.active  { border-color: var(--accent); }
.top-card.inactive { opacity: .42; }

.card-head {
  background: var(--surface2);
  padding: 9px 12px;
  display: flex; align-items: center; gap: 8px;
  border-bottom: 1.5px solid var(--border);
}
.card-num {
  width: 24px; height: 24px;
  border-radius: 6px;
  background: var(--accent); color: #fff;
  font-size: 12px; font-weight: 800;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.card-title { flex: 1; font-size: 12px; font-weight: 600; color: var(--text2); }
.ctog {
  width: 20px; height: 20px;
  border-radius: 5px;
  border: 1.5px solid var(--border2);
  background: none;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text3); font-size: 11px; font-weight: 700;
  transition: all .15s;
}
.ctog.on { background: var(--accent); border-color: var(--accent); color: #fff; }

.card-top-body {
  padding: 10px 12px;
  display: flex; flex-direction: column; gap: 6px;
}

.sec {
  font-size: 9px; font-weight: 700;
  letter-spacing: 1.2px; color: var(--text3);
  text-transform: uppercase;
}

.inp {
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  padding: 6px 9px;
  font-size: 13px; font-family: inherit;
  outline: none; width: 100%;
  transition: border-color .15s, background .15s;
}
.inp:focus { border-color: var(--accent); background: #fff; }
.inp.sm { font-size: 12px; padding: 5px 8px; }
select.inp { cursor: pointer; }

.sz-group {
  font-size: 9px; color: var(--text3);
  font-weight: 700; letter-spacing: .8px;
  text-transform: uppercase; margin: 4px 0 2px;
}
.sz-row { display: grid; grid-template-columns: 46px 1fr; gap: 4px; align-items: center; }
.sz-lbl { font-size: 12px; font-weight: 500; color: var(--text2); }
.sz-inp {
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 5px;
  color: var(--text);
  padding: 4px 7px;
  font-size: 12px; font-family: 'DM Mono', monospace;
  outline: none; width: 100%;
  transition: all .15s;
}
.sz-inp:focus { border-color: var(--accent); background: #fff; }
.sz-inp.v { background: #eff6ff; border-color: #93c5fd; color: var(--accent); font-weight: 600; }
.sz-inp::-webkit-inner-spin-button,
.sz-inp::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
.sz-inp { -moz-appearance: textfield; }

hr.d { border: none; border-top: 1.5px solid var(--border); margin: 3px 0; }

/* ── BOT CARD ─────────────────────────────────────────────────────────────── */
.bot-card {
  width: 210px; flex-shrink: 0;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  box-shadow: var(--shadow);
  padding: 12px 13px;
  display: flex; flex-direction: column; gap: 8px;
}
.bot-card.active  { border-color: var(--accent); }
.bot-card.inactive { opacity: .42; }

.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.cell { display: flex; flex-direction: column; gap: 3px; }
.cell-lbl { font-size: 10px; font-weight: 600; color: var(--text3); letter-spacing: .5px; }
.inherited { color: var(--text3) !important; background: var(--surface2) !important; }

/* 마커 타입 토글 버튼 */
.mtype-row { display: flex; gap: 5px; }
.mtype-opt {
  flex: 1; padding: 6px 4px;
  border: 1.5px solid var(--border);
  border-radius: 7px;
  background: var(--surface2);
  color: var(--text3);
  font-size: 11px; font-weight: 600;
  cursor: pointer; text-align: center;
  transition: all .15s; font-family: inherit;
  line-height: 1.3;
}
.mtype-opt.sel {
  border-color: var(--accent);
  background: #eff6ff;
  color: var(--accent);
}

/* ── PATTERN CARD ────────────────────────────────────────────────────────── */
.pttn-card {
  min-width: 300px; flex: 1;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  box-shadow: var(--shadow);
  padding: 14px 16px;
  display: flex; flex-direction: column; gap: 10px;
}
.pttn-hint { font-size: 12px; color: var(--text3); }
.pttn-list { display: flex; flex-direction: column; gap: 7px; }
.pttn-item {
  display: flex; align-items: center; gap: 9px;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 8px; padding: 8px 12px;
}
.pttn-style { font-size: 14px; font-weight: 700; color: var(--text); min-width: 50px; }
.pttn-file-btn {
  padding: 5px 12px;
  border: 1.5px dashed var(--border2);
  border-radius: 6px;
  background: none; color: var(--text3);
  font-size: 12px; font-weight: 500;
  cursor: pointer; transition: all .15s;
  white-space: nowrap; flex-shrink: 0; font-family: inherit;
}
.pttn-file-btn:hover { border-color: var(--accent); color: var(--accent); background: #eff6ff; }
.pttn-file-btn.loaded {
  border-style: solid; border-color: var(--green);
  color: var(--green); background: var(--green-bg);
}
.pttn-empty { font-size: 13px; color: var(--text3); font-style: italic; padding: 8px 0; }

/* ── STATUS BAR ──────────────────────────────────────────────────────────── */
#statusPanel {
  background: var(--surface);
  border-top: 2px solid var(--border);
  padding: 9px 24px;
  flex-shrink: 0;
  position: sticky;
  bottom: 0;
  box-shadow: 0 -2px 10px rgba(0,0,0,.07);
}
.prog-row { display: flex; align-items: center; gap: 16px; }
.prog-wrap { flex: 1; }
.prog-lbl {
  display: flex; justify-content: space-between;
  font-size: 13px; font-weight: 600; color: var(--text2);
  margin-bottom: 5px;
}
.prog-bar {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 100px; height: 6px;
}
.prog-fill {
  height: 100%; border-radius: 100px;
  background: linear-gradient(90deg, var(--accent), #7c3aed);
  transition: width .5s;
}

/* 결과 뱃지 */
#resultBadge {
  display: none;
  align-items: center;
  gap: 8px;
  background: var(--green-bg);
  border: 1.5px solid var(--green);
  border-radius: 10px;
  padding: 6px 14px;
  white-space: nowrap;
}
.result-item {
  display: flex; flex-direction: column; align-items: center;
  gap: 1px;
}
.result-lbl { font-size: 9px; font-weight: 700; color: var(--green); letter-spacing: .8px; text-transform: uppercase; }
.result-val { font-size: 15px; font-weight: 800; color: var(--green); font-family: 'DM Mono', monospace; }
.result-div { width: 1px; height: 30px; background: var(--green); opacity: .3; }

.log-tog {
  font-size: 13px; font-weight: 600;
  color: var(--text3); cursor: pointer;
  white-space: nowrap; padding: 5px 12px;
  border: 1.5px solid var(--border);
  border-radius: 7px; background: var(--surface2);
  transition: all .15s;
}
.log-tog:hover { color: var(--accent); border-color: var(--accent); }

#logPanel {
  background: #1a1816;
  border-top: 2px solid var(--border);
  padding: 10px 24px; height: 200px;
  overflow-y: auto;
  font-family: 'DM Mono', 'Consolas', monospace;
  font-size: 12px; color: #9ca3af;
  display: none; flex-shrink: 0;
}
.ll { padding: 1px 0; line-height: 1.6; }
.ll.ok   { color: #4ade80; }
.ll.err  { color: #f87171; }
.ll.info { color: #60a5fa; }
.ll.warn { color: #fbbf24; }
.opt-section {
  margin: 14px 0 0; background: var(--surface);
  border: 1.5px solid var(--border); border-radius: 12px;
  box-shadow: var(--shadow); padding: 16px 18px; min-width: max-content;
}
.opt-section h2 { font-size: 14px; font-weight: 700; color: var(--text); margin: 0 0 12px; }
.opt-grid { display: flex; flex-wrap: wrap; gap: 8px 14px; margin-bottom: 12px; }
.opt-field { display: flex; flex-direction: column; gap: 3px; }
.opt-field label { font-size: 10px; font-weight: 700; color: var(--text3); letter-spacing: .5px; text-transform: uppercase; }
.opt-field input, .opt-field select {
  background: var(--surface2); border: 1.5px solid var(--border); border-radius: 6px;
  color: var(--text); padding: 5px 8px; font-size: 12px; font-family: inherit;
  outline: none; transition: border-color .15s;
}
.opt-field input:focus, .opt-field select:focus { border-color: var(--accent); background: #fff; }
.opt-field input[type=number] { width: 72px; font-family: 'DM Mono', monospace; }
.opt-field input[type=text]   { width: 340px; font-size: 11px; }
.opt-sizes-wrap { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.opt-sz {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  border: 1.5px solid var(--border); border-radius: 7px;
  padding: 6px 8px; background: var(--surface2); min-width: 56px;
}
.opt-sz label { font-size: 10px; font-weight: 700; color: var(--text2); }
.opt-sz input {
  width: 52px; background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 5px; color: var(--text); padding: 3px 5px;
  font-size: 12px; font-family: 'DM Mono', monospace; text-align: center; outline: none;
}
.opt-sz input:focus { border-color: var(--accent); background: #fff; }
.opt-sz input.v { background: #eff6ff; border-color: #93c5fd; color: var(--accent); font-weight: 600; }
.opt-sz input::-webkit-inner-spin-button, .opt-sz input::-webkit-outer-spin-button { -webkit-appearance: none; }
.opt-sz input { -moz-appearance: textfield; }
.opt-btn-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 10px; }
.opt-run-btn {
  padding: 8px 20px; background: var(--accent); border: none; border-radius: 9px;
  color: #fff; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; transition: background .15s;
}
.opt-run-btn:hover { background: var(--accent-h); }
.opt-run-btn:disabled { opacity: .4; cursor: not-allowed; }
.opt-stop-btn {
  padding: 8px 16px; background: var(--red-bg); border: 1.5px solid var(--red);
  border-radius: 9px; color: var(--red); font-size: 13px; font-weight: 700;
  cursor: pointer; font-family: inherit; display: none;
}
.opt-badge {
  border-radius: 5px; padding: 3px 10px; font-size: 11px; font-weight: 700; display: none;
}
.opt-badge.phase1 { background: var(--yellow-bg); color: var(--yellow); display: inline-block; }
.opt-badge.phase2 { background: #dbeafe;           color: #1d4ed8;       display: inline-block; }
.opt-badge.done   { background: var(--green-bg);   color: var(--green);  display: inline-block; }
.opt-badge.error  { background: var(--red-bg);     color: var(--red);    display: inline-block; }
.opt-badge.init, .opt-badge.stopped { background: var(--surface2); color: var(--text3); display: inline-block; }
.opt-prog-wrap { background: var(--surface2); border: 1px solid var(--border); border-radius: 100px; height: 5px; width: 220px; overflow: hidden; }
.opt-prog-fill { height: 100%; border-radius: 100px; background: linear-gradient(90deg, var(--accent), #7c3aed); transition: width .4s; }
.opt-prog-txt  { font-size: 11px; color: var(--text3); white-space: nowrap; }
.opt-log-box   {
  background: #1a1816; border-radius: 8px; padding: 9px 12px; height: 130px;
  overflow-y: auto; margin-top: 8px; font-family: 'DM Mono', monospace;
  font-size: 11px; color: #9ca3af; white-space: pre-wrap; word-break: break-all; display: none;
}

/* 결과 테이블 */
.opt-results { margin-top: 14px; }
.opt-results-title { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
.opt-results table  { width: 100%; border-collapse: collapse; font-size: 12px; }
.opt-results th {
  background: var(--surface2); padding: 7px 10px; text-align: left;
  border-bottom: 1.5px solid var(--border); font-weight: 700; color: var(--text2); white-space: nowrap;
}
.opt-results td { padding: 7px 10px; border-bottom: 1px solid var(--border); color: var(--text); }
.opt-results tr.rank1 td { background: var(--yellow-bg); }
.opt-tag {
  display: inline-block; border: 1px solid var(--border); border-radius: 4px;
  padding: 1px 5px; font-size: 11px; margin: 1px 2px; background: var(--surface2);
  font-family: 'DM Mono', monospace;
}
.opt-tag.scaled { border-color: var(--accent); background: #eff6ff; color: var(--accent); }
.opt-sep { color: var(--text3); margin: 0 6px; font-weight: 700; }

/* 상세 패널 */
.opt-detail { margin-top: 12px; border: 1.5px solid var(--border); border-radius: 8px; overflow: hidden; }
.opt-detail-head {
  background: var(--surface2); padding: 8px 12px;
  font-size: 12px; font-weight: 700; color: var(--text2);
  border-bottom: 1.5px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.opt-detail table { width: 100%; border-collapse: collapse; font-size: 12px; }
.opt-detail th {
  background: var(--surface2); padding: 6px 10px; text-align: left;
  border-bottom: 1px solid var(--border); font-weight: 600; color: var(--text3);
}
.opt-detail td { padding: 6px 10px; border-bottom: 1px solid var(--border); color: var(--text); }
.opt-detail td.mono { font-family: 'DM Mono', monospace; }
.opt-waste-badge {
  display: inline-block; background: var(--orange-bg); color: var(--orange);
  border: 1px solid #fed7aa; border-radius: 4px; padding: 1px 6px;
  font-size: 10px; font-weight: 700;
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🧵</div>
    <h1>Mini Marker <span>Automation</span></h1>
  </div>
  <div class="mode-toggle">
    <button class="mode-btn active" onclick="setMode('manual')">직접 입력</button>
    <button class="mode-btn" onclick="setMode('recap')">Order Recap</button>
  </div>
  <div class="srv">
    <div class="dot" id="dot"></div>
    <span id="srvTxt">서버 연결 중...</span>
  </div>
  <div class="hdr-btns">
    <button class="hdr-btn" onclick="openDemo10()">🖥 Demo10 열기</button>
    <button class="hdr-btn show-btn" onclick="showDemo10()">🔍 진행상황 확인</button>
    <button class="start-btn" id="startBtn" onclick="startAll()">▶ 자동화 시작</button>
    <button class="cancel-btn" id="cancelBtn" onclick="cancelAuto()">■ 취소</button>
  </div>
</header>

<div id="recapBar">
  <span style="font-size:14px;font-weight:700;color:var(--yellow)">📋 Order Recap</span>
  <div class="drop-area" onclick="document.getElementById('recapFile').click()">📂 파일 클릭 또는 드래그</div>
  <input type="file" id="recapFile" accept=".xlsx,.xls" style="display:none" onchange="loadRecap(this)">
  <span id="recapName" style="font-size:12px;color:var(--text3)"></span>
</div>

<div class="main-wrap">
  <div class="top-row" id="topRow"></div>
  <div class="bottom-row" id="botRow"></div>

<section class="opt-section">

}

document.addEventListener('keydown',function(e){
  const el=e.target;
  if(!el.classList.contains('sz-inp')) return;
  if(!['Enter','ArrowDown','ArrowUp'].includes(e.key)) return;
  e.preventDefault();
  const all=[...document.querySelectorAll('.sz-inp')];
  const idx=all.indexOf(el);
  const next=e.key==='ArrowUp'?idx-1:idx+1;
  if(next>=0&&next<all.length){all[next].focus();all[next].select();}
});

    <div class="sec">Style #</div>

function init(){
  const top=document.getElementById('topRow');
  const bot=document.getElementById('botRow');
  for(let i=0;i<N_CARDS;i++){top.appendChild(makeTopCard(i));bot.appendChild(makeBotCard(i));}
  bot.appendChild(makePttnCard());
}
init();

const FABRIC_FIELDS=['width','maxlen','buf','m1_','m2_'];

function inheritFromPO1(idx){
  if(!document.getElementById('tc0').classList.contains('active')) return;
  FABRIC_FIELDS.forEach(f=>{
    const src=document.getElementById(f+'0');
    const tgt=document.getElementById(f+idx);
    if(!src||!tgt||tgt.dataset.manual) return;
    tgt.value=src.value; tgt.classList.add('inherited');
  });
  const sm=document.getElementById('mtype_val0');
  const tm=document.getElementById('mtype_val'+idx);
  if(sm&&tm&&!tm.dataset.manual) setMtype(idx, sm.value);
}

function onFabricChange(el,cardIdx){
  el.dataset.manual='1'; el.classList.remove('inherited');
  if(cardIdx===0){
    for(let i=1;i<N_CARDS;i++){
      if(!document.getElementById('tc'+i).classList.contains('active')) continue;
      if(!getStyle(i)) continue;
      FABRIC_FIELDS.forEach(f=>{
        const tgt=document.getElementById(f+i);
        if(tgt&&!tgt.dataset.manual){tgt.value=document.getElementById(f+'0').value;tgt.classList.add('inherited');}
      });
    }
  }
}

function onQty(el){ el.classList.toggle('v',!!(el.value&&+el.value>0)); }

function activateCard(i){
  const tc=document.getElementById('tc'+i),bc=document.getElementById('bc'+i),t=document.getElementById('ctog'+i);
  if(!tc.classList.contains('active')){
    tc.classList.replace('inactive','active'); bc.classList.replace('inactive','active');
    t.textContent='✓'; t.className='ctog on';
  }
}

function onStyleSel(i){
  const sel=document.getElementById('stylesel'+i),inp=document.getElementById('style'+i);
  if(sel.value==='__direct__'){inp.style.display='block';inp.value='';inp.focus();}
  else if(sel.value){
    inp.style.display='none'; inp.value=sel.value;
    document.getElementById('ctitle'+i).textContent=sel.value;
    if(i>0){activateCard(i);inheritFromPO1(i);}
    updatePttnList();
  }else{
    inp.style.display='none'; inp.value='';
    document.getElementById('ctitle'+i).textContent='PO '+(i+1);
    updatePttnList();
  }
}

function onStyleChange(i){
  const v=document.getElementById('style'+i).value.trim();
  document.getElementById('ctitle'+i).textContent=v||('PO '+(i+1));
  if(v&&i>0){activateCard(i);inheritFromPO1(i);}
  updatePttnList();
}

function getStyle(i){
  const sel=document.getElementById('stylesel'+i),inp=document.getElementById('style'+i);
  return (sel.value&&sel.value!=='__direct__'?sel.value:inp.value).trim();
}

function toggleCard(i){
  const tc=document.getElementById('tc'+i),bc=document.getElementById('bc'+i),t=document.getElementById('ctog'+i);
  const active=tc.classList.contains('active');
  [tc,bc].forEach(c=>{if(active)c.classList.replace('active','inactive');else c.classList.replace('inactive','active');});
  t.textContent=active?'−':'✓'; t.className=active?'ctog':'ctog on';
  updatePttnList();
}

function updatePttnList(){
  const styles=new Set();
  for(let i=0;i<N_CARDS;i++){
    if(!document.getElementById('tc'+i).classList.contains('active')) continue;
    const s=getStyle(i); if(s) styles.add(s);
  }
  const list=document.getElementById('pttnList');
  if(!styles.size){list.innerHTML='<span class="pttn-empty">위 카드에 Style#을 선택하면 목록이 생성됩니다</span>';return;}
  const newP={}; styles.forEach(s=>{newP[s]=dxfPaths[s]||'';}); dxfPaths=newP;
  list.innerHTML=[...styles].map(s=>`
    <div class="pttn-item" id="pi_${s}">
      <span class="pttn-style">${s}</span>
      <label class="pttn-file-btn${dxfPaths[s]?' loaded':''}" id="pb_${s}">
        ${dxfPaths[s]?'✓ '+dxfNames[s]:'📂 클릭 또는 드롭'}
        <input type="file" accept=".dxf" style="display:none" id="pf_${s}" onchange="onDxf('${s}',this)">
      </label>
      <button onclick="clearDxf('${s}')" title="삭제"
        style="flex-shrink:0;width:24px;height:24px;border-radius:50%;border:1.5px solid var(--border2);background:none;color:var(--text3);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .15s"
        onmouseover="this.style.background='var(--red-bg)';this.style.color='var(--red)';this.style.borderColor='var(--red)'"
        onmouseout="this.style.background='none';this.style.color='var(--text3)';this.style.borderColor='var(--border2)'">✕</button>
    </div>`).join('');
}

async function onDxf(style,inp){const f=inp.files[0];if(!f)return;await uploadDxf(style,f);}

async function uploadDxf(style,file){
  const pb=document.getElementById('pb_'+style);
  if(pb){pb.className='pttn-file-btn';pb.innerHTML='⏳ 업로드 중...<input type="file" accept=".dxf" style="display:none" id="pf_'+style+'" onchange="onDxf(\''+style+'\',this)">';}
  const fd=new FormData(); fd.append('file',file); fd.append('style',style);
  try{
    const r=await fetch(SERVER+'/upload_dxf',{method:'POST',body:fd});
    const data=await r.json();
    if(data.path){
      dxfPaths[style]=data.path; dxfNames[style]=file.name;
      if(pb){pb.className='pttn-file-btn loaded';pb.innerHTML='✓ '+file.name+'<input type="file" accept=".dxf" style="display:none" id="pf_'+style+'" onchange="onDxf(\''+style+'\',this)">';}
      addLog('✅ '+style+' → '+file.name,'ok');
    }else{
      if(pb){pb.className='pttn-file-btn';pb.innerHTML='❌ 실패<input type="file" accept=".dxf" style="display:none" id="pf_'+style+'" onchange="onDxf(\''+style+'\',this)">';}
      addLog('업로드 실패: '+(data.error||'서버 오류'),'err');
    }
  }catch(e){
    if(pb){pb.className='pttn-file-btn';pb.innerHTML='📂 클릭 또는 드롭<input type="file" accept=".dxf" style="display:none" id="pf_'+style+'" onchange="onDxf(\''+style+'\',this)">';}
    addLog('업로드 오류: '+e.message,'err');
  }
}

function clearDxf(style){
  dxfPaths[style]=''; dxfNames[style]='';
  const pb=document.getElementById('pb_'+style);
  if(pb){pb.className='pttn-file-btn';pb.innerHTML='📂 클릭 또는 드롭<input type="file" accept=".dxf" style="display:none" id="pf_'+style+'" onchange="onDxf(\''+style+'\',this)">';}
}

function setupDrop(){
  document.addEventListener('dragenter',e=>e.preventDefault());
  document.addEventListener('dragleave',e=>e.preventDefault());
  document.addEventListener('dragover', e=>e.preventDefault());
  document.addEventListener('drop',e=>{
    e.preventDefault();
    const files=[...(e.dataTransfer.files||[])].filter(f=>f.name.toLowerCase().endsWith('.dxf'));
    if(!files.length){addLog('DXF 파일만 드롭할 수 있습니다','warn');return;}
    const sl=Object.keys(dxfPaths);
    if(!sl.length){addLog('Style#을 먼저 선택하세요','warn');return;}
    files.forEach(f=>{
      const m=sl.find(s=>f.name.toUpperCase().includes(s.toUpperCase()));
      uploadDxf(m||sl.find(s=>!dxfPaths[s])||sl[0],f);
    });
  });
}
setupDrop();

function setMode(m){
  mode=m;
  document.querySelectorAll('.mode-btn').forEach((b,i)=>b.classList.toggle('active',(i===0&&m==='manual')||(i===1&&m==='recap')));
  document.getElementById('recapBar').style.display=m==='recap'?'flex':'none';
}

function loadRecap(inp){
  const file=inp.files[0]; if(!file) return;
  document.getElementById('recapName').textContent=file.name;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const data=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      let poRow=-1,poCols=[];
      for(let r=0;r<data.length;r++){
        const m=data[r].map((c,i)=>({c:String(c).trim(),i})).filter(x=>x.c.match(/^\d{9,10}$/));
        if(m.length){poRow=r;poCols=m.slice(0,N_CARDS);break;}
      }
      if(poRow<0){addLog('PO번호 못 찾음','err');return;}
      let szRow=-1;
      for(let r=poRow;r<Math.min(poRow+10,data.length);r++){
        if(data[r]&&data[r].some(c=>c==='XS'||c==='S'||c==='LTLL')){szRow=r;break;}
      }
      if(szRow<0){addLog('사이즈 행 못 찾음','err');return;}
      const styleRow=data[poRow-1]||[];
      poCols.forEach(({c:po,i:col},ci)=>{
        const style=String(styleRow[col]||'').trim();
        const sel=document.getElementById('stylesel'+ci);
        if(STYLES.includes(style)){sel.value=style;}
        else{sel.value='__direct__';document.getElementById('style'+ci).value=style;document.getElementById('style'+ci).style.display='block';}
        document.getElementById('ctitle'+ci).textContent=style||po;
        for(let r=szRow;r<Math.min(szRow+25,data.length);r++){
          const row=data[r];const sz=String(row[1]||row[0]||'').trim();if(!sz)break;
          if(ALL.includes(sz)){const el=document.getElementById('q'+ci+'_'+sz);if(el){el.value=parseInt(row[col])||0;onQty(el);}}
        }
        if(ci>0)inheritFromPO1(ci);
        ['tc','bc'].forEach(p=>{const c=document.getElementById(p+ci);if(c.classList.contains('inactive'))c.classList.replace('inactive','active');});
        document.getElementById('ctog'+ci).textContent='✓';document.getElementById('ctog'+ci).className='ctog on';
      });
      for(let i=poCols.length;i<N_CARDS;i++){
        ['tc','bc'].forEach(p=>{const c=document.getElementById(p+i);if(c.classList.contains('active'))c.classList.replace('active','inactive');});
        document.getElementById('ctog'+i).textContent='−';document.getElementById('ctog'+i).className='ctog';
      }
      updatePttnList();
      addLog('Order Recap 로드 완료 — '+poCols.length+'개 PO','ok');
    }catch(err){addLog('파싱 오류: '+err.message,'err');}
  };
  reader.readAsArrayBuffer(file);
}

async function showDemo10(){

async function startAll(){
  const ok=await checkServer();
  if(!ok){alert('run.bat을 먼저 실행하세요!');return;}
  const cards=[];
  for(let i=0;i<N_CARDS;i++){
    if(!document.getElementById('tc'+i).classList.contains('active')) continue;
    const style=getStyle(i);
    if(!style){alert((i+1)+'번: Style# 선택하세요');return;}
    const dxf=dxfPaths[style]||'';
    if(!dxf){alert(style+' DXF 파일을 패턴 섹션에 업로드하세요');return;}
    const sizes_qty={};
    ALL.forEach(s=>{const v=+document.getElementById('q'+i+'_'+s).value||0;if(v>0)sizes_qty[s]=v;});
    if(!Object.keys(sizes_qty).length) continue;
    const maxYds=+document.getElementById('maxlen'+i).value||11;
    cards.push({
      po:'PO'+(i+1), style, sizes_qty, dxf_path:dxf,
      width:      +document.getElementById('width'+i).value,
      length:     Math.round(maxYds*36),
      buffer:      document.getElementById('buf'+i).value,
      marker_type: document.getElementById('mtype_val'+i).value,
      phase1_min:  +document.getElementById('m1_'+i).value,
      phase2_min:  +document.getElementById('m2_'+i).value,
      bg_mode:     true,
    });
  }
  if(!cards.length){alert('실행할 PO가 없습니다');return;}
  document.getElementById('startBtn').disabled=true;
  document.getElementById('cancelBtn').style.display='block';
  document.getElementById('resultBadge').style.display='none';
  lastLogLen=0; setProgress(5,'준비 중...');
  addLog(cards.length+'개 PO 시작','info');
  for(const c of cards){
    try{await fetch(SERVER+'/start_automation',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(c)});}
    catch(e){addLog('오류: '+e.message,'err');}
  }
  if(polling) clearInterval(polling);
  polling=setInterval(pollStatus,1500);
}

async function cancelAuto(){
  try{await fetch(SERVER+'/cancel',{method:'POST'});}catch(e){}
  clearInterval(polling);
  document.getElementById('startBtn').disabled=false;
  document.getElementById('cancelBtn').style.display='none';
  addLog('취소됨','warn'); setProgress(0,'취소됨');
}

async function pollStatus(){
  try{
    const r=await fetch(SERVER+'/status');
    const data=await r.json();
    const logs=data.logs||[];
    if(logs.length>lastLogLen){
      logs.slice(lastLogLen).forEach(l=>{
        const cls=l.includes('✅')||l.includes('완료')?'ok'
                 :l.includes('❌')||l.includes('오류')||l.includes('실패')?'err'
                 :l.includes('⚠')||l.includes('⏸')?'warn':'';
        addLog(l,cls); updateProgressFromLog(l);
      });
      lastLogLen=logs.length;
    }
    if(data.progress!=null) setProgress(data.progress,data.step||'');

    // 네스팅 결과 뱃지 업데이트
    if(data.nesting_result){
      const res=data.nesting_result;
      const eff=res.efficiency!=null?res.efficiency+'%':'—';
      const lyd=res.length_yd!=null?res.length_yd:'?';
      const lin=res.length_in!=null?res.length_in+'"':'';
      document.getElementById('resEff').textContent=eff;
      document.getElementById('resLen').textContent=lyd+'yd '+lin;
      document.getElementById('resultBadge').style.display='flex';
    }

    if(!data.running&&lastLogLen>0){
      clearInterval(polling);
      document.getElementById('startBtn').disabled=false;
      document.getElementById('cancelBtn').style.display='none';
      if(logs.some(l=>l.includes('완료'))) setProgress(100,'완료!');
    }
  }catch(e){}
}

function updateProgressFromLog(l){
  if(l.includes('[1]'))      setProgress(10,'DXF 임포트');
  else if(l.includes('[2]')) setProgress(30,'마커 크기');
  else if(l.includes('[5]')) setProgress(70,'프로퍼티스');
  else if(l.includes('[6]')) setProgress(85,'네스팅');
  else if(l.includes('완료')) setProgress(100,'완료!');
}

function setProgress(pct,label){
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progPct').textContent=pct+'%';
  if(label) document.getElementById('progLabel').textContent=label;
}

let logOpen=false;
function toggleLog(){logOpen=!logOpen;document.getElementById('logPanel').style.display=logOpen?'block':'none';}
function addLog(msg,cls=''){
  const box=document.getElementById('logPanel');
  const d=document.createElement('div'); d.className='ll'+(cls?' '+cls:'');
  const t=new Date().toLocaleTimeString('ko',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  d.textContent=msg.match(/^\[\d{2}:\d{2}:\d{2}\]/)?msg:'['+t+'] '+msg;
  box.appendChild(d); box.scrollTop=box.scrollHeight;
  if(!logOpen&&cls&&cls!==''){logOpen=true;document.getElementById('logPanel').style.display='block';}
}

/* ══════════════════════════════════════════════════════════════
   Phase 3 v2 JS
   ══════════════════════════════════════════════════════════════ */
const OPT_SIZES_V2 = ['XS','S','M','L','XL','2XL','3XL','4XL','5XL','6XL',
                      'LTLL','XLTLL','2XLTLL','3XLTLL','4XLTLL','5XLTLL'];
let _optPollV2 = null;

// 사이즈 그리드 초기화
(function(){
  const wrap = document.getElementById('opt-sizes-wrap');
  if (!wrap) return;
  wrap.innerHTML = OPT_SIZES_V2.map(s =>
    `<div class="opt-sz">
       <label>${s}</label>
       <input type="number" id="oq_${s}" value="0" min="0"
              oninput="this.classList.toggle('v',+this.value>0)">
     </div>`
  ).join('');
})();

function optGetQty() {
  const q = {};
  OPT_SIZES_V2.forEach(s => {
    const v = +(document.getElementById('oq_'+s)?.value||0);
    if (v > 0) q[s] = v;
  });
  return q;
}

function optStart() {
  const qty = optGetQty();
  if (!Object.keys(qty).length) { alert('사이즈 수량을 입력하세요.'); return; }
  const dxf = document.getElementById('opt-dxf').value.trim();
  if (!dxf) { alert('DXF 경로를 입력하세요.'); return; }

  const job = {
    dxf_path:    dxf,
    sizes_qty:   qty,
    width:       +document.getElementById('opt-width').value,
    length:      +document.getElementById('opt-length').value,
    buffer:      document.getElementById('opt-buffer').value,
    marker_type: document.getElementById('opt-mtype').value,
    max_groups:  +document.getElementById('opt-maxgroups').value,
    max_markers: +document.getElementById('opt-maxmarkers').value,
    max_pieces:  +document.getElementById('opt-maxpieces').value,
    top_n:       +document.getElementById('opt-topn').value,
    phase1_min:  +document.getElementById('opt-p1min').value,
    phase2_min:  +document.getElementById('opt-p2min').value,
  };

  fetch(SERVER+'/start_optimization', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify(job)
  }).then(r=>r.json()).then(d => {
    if (d.error) { alert(d.error); return; }
    document.getElementById('opt-run-btn').disabled = true;
    document.getElementById('opt-stop-btn').style.display = 'inline-block';
    document.getElementById('opt-prog-wrap').style.display = 'block';
    document.getElementById('opt-log-box').style.display   = 'block';
    document.getElementById('opt-log-box').textContent     = '';
    document.getElementById('opt-results').style.display   = 'none';
    document.getElementById('opt-detail').style.display    = 'none';
    _optPollV2 = setInterval(optPoll, 2000);
  }).catch(e => alert('서버 연결 실패: '+e));
}

function optStop() {
  fetch(SERVER+'/stop_optimization', {method:'POST'}).catch(()=>{});
  clearInterval(_optPollV2);
}

function optPoll() {
  fetch(SERVER+'/optimization_status').then(r=>r.json()).then(d => {
    const LABELS = {
      init:'초기화', phase1:'Phase 1 — ratio 네스팅',
      phase2:'Phase 2 — scale 정밀 네스팅',
      done:'완료 ✅', error:'오류 ❌', stopped:'중단'
    };
    const badge = document.getElementById('opt-badge');
    badge.className = 'opt-badge '+(d.phase||'init');
    badge.textContent = LABELS[d.phase] || d.phase || '';

    // 진행바
    let pct = 0;
    if (d.phase==='phase1' && d.total_p1>0) pct = Math.round(d.done_p1/d.total_p1*50);
    else if (d.phase==='phase2' && d.total_p2>0) pct = 50+Math.round(d.done_p2/d.total_p2*50);
    else if (d.phase==='done') pct = 100;
    document.getElementById('opt-prog-fill').style.width = pct+'%';
    document.getElementById('opt-prog-txt').textContent  = d.progress||'';

    const logEl = document.getElementById('opt-log-box');
    if (d.log?.length) { logEl.textContent = d.log.join('\n'); logEl.scrollTop = logEl.scrollHeight; }

    if (!d.running) {
      clearInterval(_optPollV2);
      document.getElementById('opt-run-btn').disabled = false;
      document.getElementById('opt-stop-btn').style.display = 'none';
      if (d.phase !== 'error') optFetchResult();
    }
  }).catch(()=>{});
}

function optFetchResult() {
  fetch(SERVER+'/optimization_result').then(r=>r.json()).then(d => {
    if (d.error) { addLog('최적화 오류: '+d.error, 'err'); return; }
    optRender(d.final_ranking || []);
  }).catch(()=>{});
}

function optRender(ranking) {
  const el = document.getElementById('opt-results');
  el.style.display = 'block';
  document.getElementById('opt-detail').style.display = 'none';

  const title = document.getElementById('opt-results-title');
  if (ranking.length) {
    const best = ranking[0];
    title.innerHTML = `최적: <strong>${best.markers.map(m=>m.key).join(' + ')}</strong>
      → 총 <strong>${best.total_yd} yd</strong>
      (원단 ${best.total_fabric_yd} yd + 엔드웨이스트 ${best.total_endwaste_yd} yd)`;
  } else {
    title.textContent = '결과 없음';
  }

  document.getElementById('opt-result-body').innerHTML = ranking.map(row => {
    // 조합 표시: 마커별 ratio × scale
    const comboHtml = row.markers.map((m, mi) => {
      const sc = m.scale || 1;
      // spec을 scale로 나눠 원래 ratio 복원
      const origSpec = Object.entries(m.spec || {})
        .map(([s,n]) => `${s}×${Math.round(n/sc)}`).join(' ');
      const scaleTag = sc > 1
        ? `<span class="opt-tag scaled">×${sc}</span>`
        : '';
      return (mi>0?'<span class="opt-sep">|</span>':'')
           + `<span class="opt-tag">${origSpec}</span>${scaleTag}`;
    }).join('');

    const totalCuts = row.cuts.reduce((a,b)=>a+b, 0);
    return `<tr class="${row.rank===1?'rank1':''}"
              style="cursor:pointer"
              onclick="optShowDetail(${JSON.stringify(JSON.stringify(row))})"
              onmouseover="this.style.background='var(--surface2)'"
              onmouseout="this.style.background=''">
      <td>#${row.rank}</td>
      <td>${comboHtml}</td>
      <td class="mono">${totalCuts.toLocaleString()}</td>
      <td>${row.total_fabric_yd} yd</td>
      <td><span class="opt-waste-badge">${row.total_endwaste_yd} yd</span></td>
      <td><strong>${row.total_yd} yd</strong></td>
      <td style="font-size:11px;color:var(--accent)">▼ 상세</td>
    </tr>`;
  }).join('');
}

function optShowDetail(jsonStr) {
  const row = JSON.parse(jsonStr);
  document.getElementById('opt-detail').style.display = 'block';
  document.getElementById('opt-detail-title').textContent =
    `#${row.rank}  ${row.markers.map(m=>m.key).join(' + ')}`;

  document.getElementById('opt-detail-body').innerHTML = row.markers.map((m, mi) => {
    const sc     = m.scale || 1;
    const cuts   = row.cuts[mi] || 0;
    const origSpec = Object.entries(m.spec || {})
      .map(([s,n]) => `${s}×${Math.round(n/sc)}`).join('  ');
    const eff    = m.efficiency != null ? m.efficiency+'%' : '—';
    const len    = m.length_yd != null
      ? `${m.length_yd}yd ${m.length_in!=null?m.length_in.toFixed(2)+'"':''}`
      : '—';
    const sub    = m.subtotal_yd    != null ? m.subtotal_yd+' yd'    : '—';
    const waste  = m.endwaste_yd    != null ? m.endwaste_yd+' yd'    : '—';
    const total  = (m.subtotal_yd||0) + (m.endwaste_yd||0);
    return `<tr>
      <td>마커${mi+1}</td>
      <td class="mono">${origSpec}</td>
      <td class="mono">${sc > 1 ? '×'+sc : '—'}</td>
      <td class="mono">${cuts.toLocaleString()}</td>
      <td>${eff}</td>
      <td class="mono">${len}</td>
      <td class="mono">${sub}</td>
      <td><span class="opt-waste-badge">${waste}</span></td>
      <td class="mono"><strong>${total.toFixed(2)} yd</strong></td>
    </tr>`;
  }).join('');

  // 오버생산 표시
  const over = row.overproduction || {};
  const overText = Object.keys(over).length
    ? Object.entries(over).map(([s,n])=>`${s}: +${n}장`).join('  ')
    : '없음';
  document.getElementById('opt-overproduction').textContent = overText;

  document.getElementById('opt-detail').scrollIntoView({behavior:'smooth', block:'nearest'});
}
</script>
