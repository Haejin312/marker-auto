<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Marker Automation</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3450;
    --accent: #4f7cff;
    --accent2: #7c5cfc;
    --green: #22c55e;
    --yellow: #f59e0b;
    --red: #ef4444;
    --text: #e2e8f0;
    --muted: #64748b;
    --font: 'Segoe UI', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }

  header {
    background: linear-gradient(135deg, #1a1d27 0%, #12152a 100%);
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex; align-items: center; gap: 16px;
  }
  header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
  header h1 span { color: var(--accent); }
  .badge { background: var(--accent); color: #fff; font-size: 11px; font-weight: 700;
    padding: 3px 8px; border-radius: 4px; letter-spacing: 0.5px; }

  .main { display: grid; grid-template-columns: 420px 1fr; gap: 0; height: calc(100vh - 61px); }

  .panel { padding: 24px; overflow-y: auto; border-right: 1px solid var(--border); }
  .panel-right { padding: 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }

  .section { margin-bottom: 24px; }
  .section-title {
    font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
    color: var(--muted); text-transform: uppercase; margin-bottom: 12px;
    padding-bottom: 8px; border-bottom: 1px solid var(--border);
  }

  label { font-size: 13px; color: var(--muted); display: block; margin-bottom: 5px; margin-top: 10px; }
  input, select {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 9px 12px; border-radius: 8px; font-size: 14px;
    outline: none; transition: border-color 0.2s;
  }
  input:focus, select:focus { border-color: var(--accent); }

  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

  .drop-zone {
    border: 2px dashed var(--border); border-radius: 10px; padding: 20px;
    text-align: center; cursor: pointer; transition: all 0.2s; background: var(--surface);
  }
  .drop-zone:hover, .drop-zone.drag { border-color: var(--accent); background: #1e2340; }
  .drop-zone p { font-size: 13px; color: var(--muted); }
  .drop-zone p strong { color: var(--accent); }

  .size-grid {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-top: 8px;
  }
  .size-cell { display: flex; flex-direction: column; gap: 3px; }
  .size-cell span { font-size: 10px; color: var(--muted); text-align: center; font-weight: 600; }
  .size-cell input { padding: 6px 4px; text-align: center; font-size: 13px; }

  .po-list { display: flex; flex-direction: column; gap: 8px; max-height: 200px; overflow-y: auto; }
  .po-item {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 14px; display: flex; align-items: center; gap: 12px; cursor: pointer;
    transition: border-color 0.15s;
  }
  .po-item:hover { border-color: var(--accent); }
  .po-item.selected { border-color: var(--accent); background: #1e2340; }
  .po-item input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--accent); flex-shrink: 0; }
  .po-info { flex: 1; min-width: 0; }
  .po-info strong { font-size: 13px; display: block; }
  .po-info span { font-size: 11px; color: var(--muted); }
  .po-qty { font-size: 13px; font-weight: 700; color: var(--accent); flex-shrink: 0; }

  .btn {
    width: 100%; padding: 13px; border: none; border-radius: 10px;
    font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    color: #fff;
  }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-sm {
    width: auto; padding: 7px 14px; font-size: 13px; border-radius: 6px;
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  }
  .btn-sm:hover { border-color: var(--accent); color: var(--accent); }

  /* Mode tabs */
  .tabs { display: flex; gap: 0; background: var(--surface2); border-radius: 10px;
    padding: 3px; margin-bottom: 20px; }
  .tab { flex: 1; padding: 8px; text-align: center; font-size: 13px; font-weight: 600;
    border-radius: 8px; cursor: pointer; color: var(--muted); transition: all 0.2s; border: none;
    background: none; }
  .tab.active { background: var(--accent); color: #fff; }

  /* Status log */
  .log-box {
    background: #0a0d14; border: 1px solid var(--border); border-radius: 10px;
    padding: 16px; font-family: 'Consolas', monospace; font-size: 12px;
    height: 200px; overflow-y: auto; color: #94a3b8;
  }
  .log-box .log-line { padding: 1px 0; }
  .log-box .log-ok { color: var(--green); }
  .log-box .log-err { color: var(--red); }
  .log-box .log-info { color: var(--accent); }

  /* Progress */
  .progress-bar { background: var(--surface2); border-radius: 100px; height: 8px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 100px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.5s ease; }

  /* Result cards */
  .result-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
  .result-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px; position: relative;
  }
  .result-card.rank1 { border-color: #f59e0b; }
  .rank-badge {
    position: absolute; top: 12px; right: 12px;
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--surface2); display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 800; color: var(--muted);
  }
  .rank1 .rank-badge { background: #f59e0b; color: #000; }
  .result-eff { font-size: 28px; font-weight: 800; color: var(--green); }
  .result-meta { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .result-ratio { font-size: 11px; color: var(--muted); margin-top: 8px; word-break: break-all; }

  .server-status {
    display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted);
    background: var(--surface); padding: 8px 14px; border-radius: 8px; border: 1px solid var(--border);
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); flex-shrink: 0; }
  .dot.online { background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

  .step-indicator {
    display: flex; gap: 0; margin-bottom: 16px;
  }
  .step {
    flex: 1; padding: 8px 4px; text-align: center; font-size: 11px; font-weight: 600;
    color: var(--muted); border-bottom: 2px solid var(--border); position: relative;
  }
  .step.done { color: var(--green); border-color: var(--green); }
  .step.active { color: var(--accent); border-color: var(--accent); }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<header>
  <div style="width:36px;height:36px;background:linear-gradient(135deg,#4f7cff,#7c5cfc);
    border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;">🧵</div>
  <div>
    <h1>Mini Marker <span>Automation</span></h1>
  </div>
  <div style="margin-left:auto;display:flex;align-items:center;gap:12px;">
    <div class="server-status">
      <div class="dot" id="dot"></div>
      <span id="serverTxt">서버 연결 중...</span>
    </div>
  </div>
</header>

<div class="main">
<!-- LEFT PANEL -->
<div class="panel">

  <!-- Mode -->
  <div class="tabs">
    <button class="tab active" onclick="setMode('single')">Single PO</button>
    <button class="tab" onclick="setMode('recap')">Order Recap</button>
  </div>

  <!-- ORDER RECAP MODE -->
  <div id="recapMode" style="display:none">
    <div class="section">
      <div class="section-title">Order Recap 업로드</div>
      <div class="drop-zone" id="dropZone" onclick="document.getElementById('recapFile').click()">
        <input type="file" id="recapFile" accept=".xlsx,.xls" style="display:none" onchange="loadRecap(this)">
        <p>📂 클릭하거나 파일을 드래그하세요</p>
        <p><strong>.xlsx</strong> 파일만 지원</p>
      </div>
    </div>
    <div class="section" id="poListSection" style="display:none">
      <div class="section-title" style="display:flex;align-items:center;justify-content:space-between">
        <span>PO 목록</span>
        <button class="btn-sm" onclick="selectAll()">전체선택</button>
      </div>
      <div class="po-list" id="poList"></div>
    </div>
  </div>

  <!-- SINGLE MODE -->
  <div id="singleMode">
    <div class="section">
      <div class="section-title">Style 정보</div>
      <label>Style #</label>
      <input type="text" id="styleNo" placeholder="K87">
      <label>PO #</label>
      <input type="text" id="poNo" placeholder="3510049632">
      <label>Color</label>
      <input type="text" id="colorName" placeholder="BLACK">
    </div>
    <div class="section">
      <div class="section-title">사이즈별 수량</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:8px">Regular</div>
      <div class="size-grid">
        <div class="size-cell"><span>XS</span><input type="number" id="q_XS" value="0" min="0"></div>
        <div class="size-cell"><span>S</span><input type="number" id="q_S" value="0" min="0"></div>
        <div class="size-cell"><span>M</span><input type="number" id="q_M" value="0" min="0"></div>
        <div class="size-cell"><span>L</span><input type="number" id="q_L" value="0" min="0"></div>
        <div class="size-cell"><span>XL</span><input type="number" id="q_XL" value="0" min="0"></div>
        <div class="size-cell"><span>2XL</span><input type="number" id="q_2XL" value="0" min="0"></div>
        <div class="size-cell"><span>3XL</span><input type="number" id="q_3XL" value="0" min="0"></div>
        <div class="size-cell"><span>4XL</span><input type="number" id="q_4XL" value="0" min="0"></div>
        <div class="size-cell"><span>5XL</span><input type="number" id="q_5XL" value="0" min="0"></div>
        <div class="size-cell"><span>6XL</span><input type="number" id="q_6XL" value="0" min="0"></div>
      </div>
      <div style="font-size:11px;color:var(--muted);margin:10px 0 8px">Tall</div>
      <div class="size-grid">
        <div class="size-cell"><span>LTLL</span><input type="number" id="q_LTLL" value="0" min="0"></div>
        <div class="size-cell"><span>XLTLL</span><input type="number" id="q_XLTLL" value="0" min="0"></div>
        <div class="size-cell"><span>2XLTLL</span><input type="number" id="q_2XLTLL" value="0" min="0"></div>
        <div class="size-cell"><span>3XLTLL</span><input type="number" id="q_3XLTLL" value="0" min="0"></div>
        <div class="size-cell"><span>4XLTLL</span><input type="number" id="q_4XLTLL" value="0" min="0"></div>
        <div class="size-cell"><span>5XLTLL</span><input type="number" id="q_5XLTLL" value="0" min="0"></div>
      </div>
    </div>
  </div>

  <!-- COMMON SETTINGS -->
  <div class="section">
    <div class="section-title">마커 설정</div>
    <label>DXF 파일 경로</label>
    <input type="text" id="dxfPath" placeholder="C:\AL\MKT019-K87-S21.dxf">
    <div class="row2">
      <div><label>원단 폭 (inches)</label><input type="number" id="fabricWidth" value="74"></div>
      <div><label>마커 길이 (inches)</label><input type="number" id="markerLength" value="500"></div>
    </div>
    <div class="row2">
      <div><label>버퍼 (inches)</label><input type="text" id="bufferVal" value="0.125"></div>
      <div><label>최대 기장 (yards)</label><input type="number" id="maxLen" value="11" step="0.5"></div>
    </div>
    <label>플립 키워드 (쉼표 구분)</label>
    <input type="text" id="flipKw" value="SLV" placeholder="SLV,SLV2">
    <div class="row2" style="margin-top:10px">
      <div><label>1단계 (분)</label><input type="number" id="phase1Min" value="1" min="1"></div>
      <div><label>2단계 (분)</label><input type="number" id="phase2Min" value="5" min="1"></div>
    </div>
  </div>

  <button class="btn btn-primary" id="startBtn" onclick="startAutomation()">
    ▶ 자동화 시작
  </button>

</div>

<!-- RIGHT PANEL -->
<div class="panel-right">

  <!-- Step indicator -->
  <div class="step-indicator" id="stepBar">
    <div class="step" id="s1">DXF 임포트</div>
    <div class="step" id="s2">마커 설정</div>
    <div class="step" id="s3">플립</div>
    <div class="step" id="s4">회전</div>
    <div class="step" id="s5">프로퍼티</div>
    <div class="step" id="s6">탐색</div>
    <div class="step" id="s7">정밀</div>
  </div>

  <!-- Progress -->
  <div>
    <div style="display:flex;justify-content:space-between;margin-bottom:6px">
      <span style="font-size:13px;font-weight:600" id="progressLabel">대기 중</span>
      <span style="font-size:13px;color:var(--muted)" id="progressPct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <!-- Log -->
  <div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <span class="section-title" style="margin:0;border:none;padding:0">실행 로그</span>
      <button class="btn-sm" onclick="clearLog()">지우기</button>
    </div>
    <div class="log-box" id="logBox"></div>
  </div>

  <!-- Results -->
  <div id="resultsSection" style="display:none">
    <div class="section-title">최적 마커 조합 결과</div>
    <div class="result-grid" id="resultGrid"></div>
  </div>

</div>
</div>

<script>
const SERVER = 'http://127.0.0.1:5055';
let mode = 'single';
let poData = [];
let polling = null;
let lastLogCount = 0;

// ── 서버 상태 체크 ──────────────────────────
async function checkServer() {
  try {
    const r = await fetch(SERVER + '/status', {signal: AbortSignal.timeout(2000)});
    if (r.ok) {
      document.getElementById('dot').className = 'dot online';
      document.getElementById('serverTxt').textContent = '서버 연결됨';
      return true;
    }
  } catch(e) {}
  document.getElementById('dot').className = 'dot';
  document.getElementById('serverTxt').textContent = 'run.bat 실행 필요';
  return false;
}

setInterval(checkServer, 3000);
checkServer();

// ── 모드 전환 ──────────────────────────────
function setMode(m) {
  mode = m;
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&m==='single')||(i===1&&m==='recap')));
  document.getElementById('singleMode').style.display = m==='single'?'block':'none';
  document.getElementById('recapMode').style.display = m==='recap'?'block':'none';
}

// ── Order Recap 파싱 ───────────────────────
function loadRecap(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const wb = XLSX.read(e.target.result, {type:'array'});
    const ws = wb.Sheets[wb.SheetNames[0]];
    const data = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});

    const SIZES_REG  = ['XS','S','M','L','XL','2XL','3XL','4XL','5XL','6XL'];
    const SIZES_TALL = ['LTLL','XLTLL','2XLTLL','3XLTLL','4XLTLL','5XLTLL'];

    let poRow=-1, sizeStartRow=-1, poColumns=[];
    for (let r=0;r<data.length;r++) {
      const row = data[r];
      if (row.some(c=>String(c).includes('3510')||String(c).match(/^\d{10}$/))) {
        poRow = r;
        row.forEach((c,i)=>{ if(String(c).match(/\d{9,10}/)) poColumns.push({po:String(c).trim(),col:i}); });
        break;
      }
    }
    for (let r=poRow;r<Math.min(poRow+10,data.length);r++) {
      if (data[r] && data[r].some(c=>c==='XS'||c==='S'||c==='LTLL')) { sizeStartRow=r; break; }
    }
    if (poRow<0||sizeStartRow<0||!poColumns.length) {
      addLog('Order Recap 파싱 실패','err'); return;
    }

    const styleRow = data[poRow-1]||[];
    const colorRow = data[poRow+1]||[];

    poData = poColumns.map(({po,col})=>{
      const sizes={};
      let pcsCol = col;
      for (let r=sizeStartRow; r<Math.min(sizeStartRow+20,data.length); r++) {
        const row=data[r];
        const sz=String(row[1]||row[0]||'').trim();
        if (!sz) break;
        const qty=parseInt(row[pcsCol])||0;
        if([...SIZES_REG,...SIZES_TALL].includes(sz)) sizes[sz]=qty;
      }
      const total=Object.values(sizes).reduce((a,b)=>a+b,0);
      const style=String(styleRow[col]||'').trim()||'';
      const color=String(colorRow[col]||'').trim()||'';
      return {po,style,color,sizes,total};
    });

    renderPoList();
    document.getElementById('poListSection').style.display='block';
    addLog('Order Recap 로드 완료 - '+poData.length+'개 PO','ok');
  };
  reader.readAsArrayBuffer(file);
}

function renderPoList() {
  const el = document.getElementById('poList');
  el.innerHTML = poData.map((p,i)=>`
    <div class="po-item" onclick="togglePo(${i})">
      <input type="checkbox" id="poc${i}" checked onchange="event.stopPropagation()">
      <div class="po-info">
        <strong>${p.po}</strong>
        <span>${p.style} / ${p.color}</span>
      </div>
      <div class="po-qty">${p.total.toLocaleString()}</div>
    </div>`).join('');
}

function togglePo(i) {
  const cb = document.getElementById('poc'+i);
  cb.checked = !cb.checked;
}

function selectAll() {
  document.querySelectorAll('#poList input[type=checkbox]').forEach(cb=>cb.checked=true);
}

// ── 자동화 시작 ────────────────────────────
async function startAutomation() {
  const ok = await checkServer();
  if (!ok) { alert('먼저 run.bat를 실행하세요!'); return; }

  const dxf = document.getElementById('dxfPath').value.trim();
  if (!dxf) { alert('DXF 파일 경로를 입력하세요'); return; }

  const settings = {
    dxf_path: dxf,
    width: +document.getElementById('fabricWidth').value,
    length: +document.getElementById('markerLength').value,
    buffer: document.getElementById('bufferVal').value,
    max_len_yd: +document.getElementById('maxLen').value,
    flip_keywords: document.getElementById('flipKw').value.split(',').map(s=>s.trim()),
    phase1_min: +document.getElementById('phase1Min').value,
    phase2_min: +document.getElementById('phase2Min').value,
    top_n: 5
  };

  let pos = [];
  if (mode==='single') {
    const sizes={};
    ['XS','S','M','L','XL','2XL','3XL','4XL','5XL','6XL','LTLL','XLTLL','2XLTLL','3XLTLL','4XLTLL','5XLTLL']
      .forEach(s=>{ const v=+document.getElementById('q_'+s).value; if(v>0) sizes[s]=v; });
    pos = [{po: document.getElementById('poNo').value||'PO001',
             style: document.getElementById('styleNo').value,
             color: document.getElementById('colorName').value,
             sizes}];
  } else {
    const cbs = document.querySelectorAll('#poList input[type=checkbox]');
    poData.forEach((p,i)=>{ if(cbs[i]&&cbs[i].checked) pos.push(p); });
  }

  if (!pos.length) { alert('PO를 선택하세요'); return; }

  document.getElementById('startBtn').disabled = true;
  document.getElementById('resultsSection').style.display='none';
  setStep(1);

  // 첫 번째 PO부터 순차 실행
  addLog('자동화 시작 - '+pos.length+'개 PO','info');

  for (const po of pos) {
    addLog('PO '+po.po+' 시작','info');
    const payload = {...settings, ...po};
    try {
      await fetch(SERVER+'/start_automation', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify(payload)
      });
    } catch(e) {
      addLog('서버 오류: '+e.message,'err');
    }
  }

  // 폴링 시작
  if (polling) clearInterval(polling);
  polling = setInterval(pollStatus, 2000);
}

let stepProgress = 0;
async function pollStatus() {
  try {
    const r = await fetch(SERVER+'/status');
    const data = await r.json();
    const logs = data.logs || [];

    // 새 로그만 추가
    if (logs.length > lastLogCount) {
      logs.slice(lastLogCount).forEach(l => {
        const cls = l.includes('완료')||l.includes('성공') ? 'ok'
                  : l.includes('오류')||l.includes('없음')||l.includes('실패') ? 'err' : '';
        addLog(l, cls);
        updateStepFromLog(l);
      });
      lastLogCount = logs.length;
    }

    // 결과 표시
    const results = data.results || {};
    if (Object.keys(results).length) {
      showResults(results);
    }

    // 완료 감지
    if (logs.some(l=>l.includes('완료'))) {
      setProgress(100, '완료!');
      document.getElementById('startBtn').disabled = false;
      clearInterval(polling);
    }
  } catch(e) {}
}

function updateStepFromLog(log) {
  if (log.includes('[1]')) { setStep(1); setProgress(10,'DXF 임포트 중'); }
  else if (log.includes('[2]')) { setStep(2); setProgress(20,'마커 크기 설정'); }
  else if (log.includes('[3]')) { setStep(3); setProgress(30,'패턴 플립'); }
  else if (log.includes('[4]')) { setStep(4); setProgress(40,'패턴 회전'); }
  else if (log.includes('[5]')) { setStep(5); setProgress(50,'프로퍼티 설정'); }
  else if (log.includes('[6]')||log.includes('조합 생성')) { setStep(6); setProgress(60,'1단계 탐색'); }
  else if (log.includes('위:')) { setStep(7); setProgress(85,'2단계 정밀'); }
  else if (log.includes('완료')) { setProgress(100,'완료!'); }
}

function setStep(n) {
  for(let i=1;i<=7;i++) {
    const el=document.getElementById('s'+i);
    if (!el) continue;
    el.className='step'+(i<n?' done':i===n?' active':'');
  }
}

function setProgress(pct, label) {
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressPct').textContent=pct+'%';
  document.getElementById('progressLabel').textContent=label;
}

function showResults(results) {
  document.getElementById('resultsSection').style.display='block';
  const grid = document.getElementById('resultGrid');
  grid.innerHTML='';
  Object.values(results).forEach(poResults=>{
    (Array.isArray(poResults)?poResults:[]).forEach(r=>{
      const ratio = Object.entries(r.ratio||{}).filter(([,v])=>v>0)
        .map(([s,v])=>s+':'+v).join(' ');
      grid.innerHTML+=`
        <div class="result-card ${r.rank===1?'rank1':''}">
          <div class="rank-badge">${r.rank}</div>
          <div class="result-eff">${r.efficiency}%</div>
          <div class="result-meta">${r.length_yd}yd · ${r.po}</div>
          <div class="result-ratio">${ratio}</div>
        </div>`;
    });
  });
}

// ── 로그 ──────────────────────────────────
function addLog(msg, cls='') {
  const box = document.getElementById('logBox');
  const line = document.createElement('div');
  line.className='log-line'+(cls?' log-'+cls:'');
  const time = new Date().toLocaleTimeString('ko',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  line.textContent='['+time+'] '+msg;
  box.appendChild(line);
  box.scrollTop=box.scrollHeight;
}

function clearLog() {
  document.getElementById('logBox').innerHTML='';
  lastLogCount=0;
}

// drag & drop
const dz=document.getElementById('dropZone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag');});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
dz.addEventListener('drop',e=>{
  e.preventDefault(); dz.classList.remove('drag');
  const f=e.dataTransfer.files[0];
  if(f){ const inp=document.getElementById('recapFile'); inp.files=e.dataTransfer.files; loadRecap(inp); }
});
</script>
